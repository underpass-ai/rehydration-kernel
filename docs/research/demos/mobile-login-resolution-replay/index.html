<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mobile Login Resolution Replay</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Kernel Memory Demo</p>
        <h1>Mobile Login Resolution Replay</h1>
        <p id="run-meta" class="run-meta"></p>
      </div>
      <div id="metrics" class="metrics" aria-label="Current replay metrics"></div>
    </header>

    <main class="app-shell">
      <section class="workspace" aria-label="Incident graph workspace">
        <div class="toolbar">
          <nav id="view-buttons" class="view-buttons" aria-label="Replay views"></nav>
          <div class="zoom-controls" aria-label="Graph zoom controls">
            <button type="button" data-action="zoom-out" title="Zoom out">-</button>
            <button type="button" data-action="fit" title="Fit graph">Fit</button>
            <button type="button" data-action="zoom-in" title="Zoom in">+</button>
          </div>
        </div>

        <div id="session-filters" class="session-filters" aria-label="Session filters"></div>

        <div class="graph-frame">
          <svg
            id="incident-graph"
            class="incident-graph"
            role="img"
            aria-label="Navigable graph of the mobile login resolution replay"
          ></svg>
        </div>
      </section>

      <aside id="inspector" class="inspector" aria-label="Selected memory object"></aside>

      <section class="timeline-panel" aria-label="Incident timeline">
        <div id="timeline" class="timeline"></div>
      </section>
    </main>

    <script src="./incident-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
