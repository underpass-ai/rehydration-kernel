# Reasoning comparison: Qwen3-8B vs Qwen3-14B (thinking)
# Same judge, same variants. Compares if CoT improves rationale preservation.

keys:
  anthropic_env: ANTHROPIC_KEY
  openai_env: OPENAI_KEY

tls:
  cert: /tmp/vllm-client.crt
  key: /tmp/vllm-client.key

agents:
  qwen3-8b:
    endpoint: https://llm.underpassai.com/v1/chat/completions
    model: Qwen/Qwen3-8B
    provider: openai
    tls: true

  qwen3-14b:
    endpoint: http://localhost:8001/v1/chat/completions
    model: Qwen/Qwen3-14B
    provider: openai

judges:
  sonnet-4.6:
    endpoint: https://api.anthropic.com/v1/messages
    model: claude-sonnet-4-6
    provider: anthropic
    api_key_env: ANTHROPIC_KEY

prompts:
  default: null

scales:
  micro: micro
  stress: stress

seeds_per_cell: 1

noise:
  clean: structural
  competing: competing-causal
