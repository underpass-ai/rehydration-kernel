# Pressure test: BENCHMARK_TOKEN_BUDGET=512 exercises planner v2
# Both models under same budget pressure to compare planner decisions.
# 72 evals: 2 agents × 3 scales × 2 domains × 3 mixes × 2 noise

keys:
  anthropic_env: ANTHROPIC_KEY
  openai_env: OPENAI_KEY

tls:
  cert: /tmp/vllm-client.crt
  key: /tmp/vllm-client.key

agents:
  qwen3-8b:
    endpoint: https://llm.underpassai.com/v1/chat/completions
    model: Qwen/Qwen3-8B
    provider: openai
    tls: true

  qwen3-14b:
    endpoint: http://localhost:8001/v1/chat/completions
    model: Qwen/Qwen3-14B
    provider: openai

judges:
  sonnet-4.6:
    endpoint: https://api.anthropic.com/v1/messages
    model: claude-sonnet-4-6
    provider: anthropic
    api_key_env: ANTHROPIC_KEY

prompts:
  default: null

scales:
  micro: micro
  meso: meso
  stress: stress

seeds_per_cell: 1

noise:
  clean: structural
  competing: competing-causal
  conflicting: conflicting-path
  restart: competing-restart
