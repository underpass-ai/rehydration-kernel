# Smoke run: minimal config to verify the pipeline works.
# 6 evals: 1 scale × 2 domains × 3 mixes × 1 noise (clean) × 1 seed
# Cost: ~$0.005 (sonnet judge only)

keys:
  anthropic_env: ANTHROPIC_KEY
  openai_env: OPENAI_KEY

tls:
  cert: /tmp/vllm-client.crt
  key: /tmp/vllm-client.key

agents:
  qwen3-8b:
    endpoint: https://llm.underpassai.com/v1/chat/completions
    model: Qwen/Qwen3-8B
    provider: openai
    tls: true

judges:
  sonnet-4.6:
    endpoint: https://api.anthropic.com/v1/messages
    model: claude-sonnet-4-6
    provider: anthropic
    api_key_env: ANTHROPIC_KEY

prompts:
  default: null

scales:
  micro: micro

seeds_per_cell: 1

noise:
  clean: structural
