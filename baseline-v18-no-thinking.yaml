# Controlled baseline: same infra as thinking run, thinking OFF.
#
# Purpose: isolate the thinking variable. Same vLLM v0.18.0, same temp=0.6,
# same max_tokens=4096, same judge. Only difference: LLM_ENABLE_THINKING=false.
#
# Run:
#   EVAL_MATRIX_PATH=baseline-v18-no-thinking.yaml \
#   LLM_ENABLE_THINKING=false \
#   cargo test -p rehydration-tests-paper --features container-tests \
#     --test llm_judge_prompt_evaluation -- --nocapture --test-threads=1

keys:
  anthropic_env: ANTHROPIC_KEY
  openai_env: OPENAI_KEY

tls:
  cert: /tmp/vllm-client.crt
  key: /tmp/vllm-client.key

agents:
  qwen3-8b:
    endpoint: https://llm.underpassai.com/v1/chat/completions
    model: Qwen/Qwen3-8B
    provider: openai
    tls: true
    max_tokens: 4096
    temperature: 0.6

judges:
  sonnet-4.6:
    endpoint: https://api.anthropic.com/v1/messages
    model: claude-sonnet-4-6
    provider: anthropic
    api_key_env: ANTHROPIC_KEY

prompts:
  default: null

scales:
  micro: micro
  meso: meso
  stress: stress

seeds_per_cell: 3

noise:
  clean: structural
  competing: competing-causal
  conflicting: conflicting-path
  restart: competing-restart
