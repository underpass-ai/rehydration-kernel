# Baseline run: planner v1 (token pressure only)
# 108 evals: 3 scales × 2 domains × 3 mixes × 2 noise × 3 seeds × 1 agent × 1 judge
# Cost: ~$0.35 (sonnet judge)
# Purpose: capture before planner enrichment for A/B comparison

keys:
  anthropic_env: ANTHROPIC_KEY
  openai_env: OPENAI_KEY

tls:
  cert: /tmp/vllm-client.crt
  key: /tmp/vllm-client.key

agents:
  qwen3-8b:
    endpoint: https://llm.underpassai.com/v1/chat/completions
    model: Qwen/Qwen3-8B
    provider: openai
    tls: true

judges:
  sonnet-4.6:
    endpoint: https://api.anthropic.com/v1/messages
    model: claude-sonnet-4-6
    provider: anthropic
    api_key_env: ANTHROPIC_KEY

prompts:
  default: null

scales:
  micro: micro
  meso: meso
  stress: stress

seeds_per_cell: 3

noise:
  clean: structural
  competing: competing-causal
  conflicting: conflicting-path
  restart: competing-restart
