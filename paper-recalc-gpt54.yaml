# Paper recalculation: Qwen3-8B (thinking) + GPT-5.4 judge
#
# Run: 2026-03-29
# Purpose: Recalculate all paper metrics with correct configuration:
#   - vLLM v0.18.0-cu130 with --reasoning-parser=qwen3
#   - Qwen3-8B thinking mode (default, no chat_template_kwargs)
#   - Planner v3+v4 active
#   - max_tokens=4096, temperature=0.6 (Qwen3 model card)
#   - GPT-5.4 as independent judge
#
# Command:
#   EVAL_MATRIX_PATH=paper-recalc-gpt54.yaml \
#   cargo test -p rehydration-tests-paper --features container-tests \
#     --test llm_judge_prompt_evaluation -- --nocapture --test-threads=1

keys:
  anthropic_env: ANTHROPIC_KEY
  openai_env: OPENAI_KEY

tls:
  cert: /tmp/vllm-client.crt
  key: /tmp/vllm-client.key

agents:
  qwen3-8b:
    endpoint: https://llm.underpassai.com/v1/chat/completions
    model: Qwen/Qwen3-8B
    provider: openai
    tls: true
    max_tokens: 4096
    temperature: 0.6

judges:
  gpt-5.4:
    endpoint: https://api.openai.com/v1/chat/completions
    model: gpt-5.4
    provider: openai-new
    api_key_env: OPENAI_KEY

prompts:
  default: null  # compiled-in v2 causal-aware prompt

scales:
  micro: micro
  meso: meso
  stress: stress

seeds_per_cell: 3

noise:
  clean: structural
  competing: competing-causal
  conflicting: conflicting-path
  restart: competing-restart
