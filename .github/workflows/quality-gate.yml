name: quality-gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0

      - name: Install protoc
        run: bash scripts/ci/install-protoc.sh

      - name: Run contract gate
        env:
          CONTRACT_BREAKING_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: bash scripts/ci/contract-gate.sh

  rustfmt:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0
          components: clippy

      - name: Install protoc
        run: bash scripts/ci/install-protoc.sh

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0

      - name: Install protoc
        run: bash scripts/ci/install-protoc.sh

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5

      - name: Run tests
        run: cargo test --workspace --locked

  integration-valkey:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5

      - name: Verify Docker
        run: docker version

      - name: Run Valkey integration tests
        run: bash scripts/ci/integration-valkey.sh

  integration-neo4j:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5

      - name: Verify Docker
        run: docker version

      - name: Run Neo4j integration tests
        run: bash scripts/ci/integration-neo4j.sh

  integration-nats-compatibility:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5

      - name: Verify Docker
        run: docker version

      - name: Run NATS compatibility integration tests
        run: bash scripts/ci/integration-nats-compatibility.sh

  integration-grpc-compatibility:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0

      - name: Install protoc
        run: bash scripts/ci/install-protoc.sh

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5

      - name: Verify Docker
        run: docker version

      - name: Run gRPC compatibility integration tests
        run: bash scripts/ci/integration-grpc-compatibility.sh

  integration-agentic-context:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0

      - name: Install protoc
        run: bash scripts/ci/install-protoc.sh

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5

      - name: Verify Docker
        run: docker version

      - name: Run agentic context integration tests
        run: bash scripts/ci/integration-agentic-context.sh

  sonarcloud:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    needs:
      - contract
      - rustfmt
      - clippy
      - test
      - integration-valkey
      - integration-neo4j
      - integration-nats-compatibility
      - integration-grpc-compatibility
      - integration-agentic-context
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_HOST_URL: https://sonarcloud.io
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      PR_FROM_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork || false }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Evaluate Sonar configuration
        id: sonar-config
        shell: bash
        run: |
          enabled=true
          reason=""

          if [ -z "${SONAR_TOKEN}" ]; then
            enabled=false
            reason="SONAR_TOKEN secret is not configured"
          elif [ "${PR_FROM_FORK}" = "true" ]; then
            enabled=false
            reason="SonarCloud scan is disabled for forked pull requests"
          fi

          echo "enabled=${enabled}" >> "${GITHUB_OUTPUT}"
          echo "reason=${reason}" >> "${GITHUB_OUTPUT}"

      - name: Skip SonarCloud
        if: steps.sonar-config.outputs.enabled != 'true'
        run: echo "::notice::Skipping SonarCloud. ${{ steps.sonar-config.outputs.reason }}"

      - name: Install Rust toolchain
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: 1.90.0
          components: llvm-tools-preview

      - name: Install protoc
        if: steps.sonar-config.outputs.enabled == 'true'
        run: bash scripts/ci/install-protoc.sh

      - name: Install cargo-llvm-cov
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: taiki-e/install-action@b81531fd070ace482ba6b315eb6c35611e1c37d3

      - name: Cache Rust build artifacts
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5

      - name: Cache Sonar packages
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: |
            ${{ runner.os }}-sonar

      - name: Verify Docker
        if: steps.sonar-config.outputs.enabled == 'true'
        run: docker version

      - name: Generate Rust coverage
        if: steps.sonar-config.outputs.enabled == 'true'
        run: bash scripts/ci/rust-coverage.sh

      - name: SonarCloud scan
        if: steps.sonar-config.outputs.enabled == 'true'
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: ${{ github.workspace }}
