# Evaluation matrix: models × prompt variants.
#
# Each cell runs the 4-UC e2e test with the given model config and prompt file.
# Use: bash scripts/ci/evaluate-prompt-variants.sh [path-to-this-file]
#
# API keys are read from environment: ANTHROPIC_KEY, OPENAI_KEY
# vLLM certs: LLM_TLS_CERT_PATH, LLM_TLS_KEY_PATH (set before running)

agents:
  qwen3-8b:
    endpoint: https://llm.underpassai.com/v1/chat/completions
    model: Qwen/Qwen3-8B
    provider: openai
    tls: true

  gpt-5.4:
    endpoint: https://api.openai.com/v1/chat/completions
    model: gpt-5.4
    provider: openai-new
    api_key_env: OPENAI_KEY

  opus-4.6:
    endpoint: https://api.anthropic.com/v1/messages
    model: claude-opus-4-6
    provider: anthropic
    api_key_env: ANTHROPIC_KEY

judges:
  opus-4.6:
    endpoint: https://api.anthropic.com/v1/messages
    model: claude-opus-4-6
    provider: anthropic
    api_key_env: ANTHROPIC_KEY

  gpt-5.4:
    endpoint: https://api.openai.com/v1/chat/completions
    model: gpt-5.4
    provider: openai-new
    api_key_env: OPENAI_KEY

prompts:
  v1-original: prompt-variants/v1-original-judge.yaml
  default: null  # v2 causal-aware (compiled-in llm_prompts.yaml)
  citation-agent: prompt-variants/citation-agent.yaml
  strict-judge: prompt-variants/strict-judge.yaml
  lenient-judge: prompt-variants/lenient-judge.yaml

# Graph scales for context capture. Each scale produces different
# rendered context sizes — larger graphs trigger truncation.
scales:
  micro: micro    # 4 nodes, ~200-500 tokens, no truncation
  meso: meso      # 21 nodes, ~1500 tokens, moderate truncation at low budgets
  stress: stress  # 49 nodes, ~4000 tokens, heavy truncation

noise:
  clean: none              # no distractors
  competing: competing     # competing causal distractors
