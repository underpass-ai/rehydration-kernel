# LLM evaluation prompts for the rehydration kernel benchmark.
#
# Edit these prompts without recompiling. The evaluator loads this file
# at runtime via include_str! (compiled into the binary) or from an
# override path set in LLM_PROMPTS_PATH.
#
# Available placeholders:
#   inference_prompt: {rendered_context}, {question}
#   judge_prompt: {domain_context}, {llm_response}, {expected_failure},
#                 {expected_restart}, {expected_reason}, {distractor_rationale}

# Prompt sent to the inference model (GPT-5.4, Claude, vLLM, etc.)
inference_prompt: |
  You are analyzing a rehydrated context bundle from a graph-based system.
  The bundle contains nodes and relationships reconstructed for agent continuity.

  Key metadata in the graph:
  - Nodes have: node_id, node_kind, title, summary, status, labels
  - Relationships have: relation_type, semantic_class (causal, motivational,
    evidential, procedural, structural), rationale, method, decision_id
  - The causal chain flows from root through related nodes via relationships
  - Rationale fields explain WHY each relationship exists — cite them when present

  ## Rehydrated context

  {rendered_context}

  ## Task

  {question}

  When answering:
  - Trace the causal chain from root to leaf, following relationship types
  - Quote or paraphrase rationale text from relationships when available
  - If no rationale, method, or decision_id metadata is present in ANY
    relationship, set reason to "NOT_AVAILABLE" and reason_source to "not_available"
  - If you derive a reason by inference rather than citing metadata, set
    reason_source to "inferred" — do not claim graph_metadata
  - Set confidence to "high" only when quoting or closely paraphrasing
    rationale text from the context
  - Identify the restart point based on causal evidence, not just position

  Answer in JSON:
  {"failure_point": "the root cause node or event",
  "restart_node": "the node to restart from, with causal justification",
  "reason": "the dominant rationale — quote from context, or NOT_AVAILABLE",
  "reason_source": "graph_metadata | inferred | not_available",
  "confidence": "high | medium | low"}

# Prompt sent to the judge model (Claude Opus 4, GPT-5.4, etc.)
judge_prompt: |
  You are an evaluation judge for a context rehydration benchmark.
  The system reconstructs {domain_context} graph context so an AI agent can
  resume work. The graph contains nodes with metadata and relationships with
  semantic_class (causal/motivational/evidential/procedural/structural),
  rationale, and decision_id fields.

  ## LLM Response (from the model under test)
  {llm_response}

  ## Ground Truth
  - Failure point / root cause: {expected_failure}
  - Restart node (where the system should resume): {expected_restart}
  - Dominant rationale (main causal chain): {expected_reason}
  - Distractor rationale (from noise/competing branches): {distractor_rationale}

  ## Evaluation rules
  1. **Semantic match**: judge by concept and causal role, not exact node IDs.
     Node IDs are synthetic — match by role and position in the causal chain.
     A response naming a causally upstream node (the triggering event instead
     of the resulting decision) is a valid match if the response demonstrates
     it traced the causal path between them.
  2. **task_correct**: true if the response identifies a failure point that is
     EITHER the ground truth OR a causally connected node in the same failure
     chain (upstream trigger, downstream consequence, or the decision linking
     them). The response must show it traced causality, not just named an
     arbitrary node.
  3. **restart_correct**: true if the response identifies a plausible restart
     point AND provides a causal justification for WHY. Simply naming a node
     without causal reasoning is NOT sufficient.
  3a. **restart_exact**: true if the restart node matches the ground truth exactly.
  3b. **restart_off_by_one**: true if the restart node is a direct neighbor (±1 hop) of the ground truth restart on the main chain.
  3c. **restart_on_competing_branch**: true if the restart node is on a distractor/noise branch rather than the main chain.
  3d. **restart_explained**: true if the response provides causal justification for WHY it chose that restart point, regardless of whether the choice is correct.
  4. **reason_correct_main_path**: true if the response preserves rationale
     from the MAIN causal chain (the dominant rationale above). Sub-rules:
     - A paraphrase that captures the SAME SPECIFIC concept counts.
     - Citing relationship rationale text, decision IDs, or semantic_class
       metadata from the main chain is strong evidence.
     - If the ground truth rationale is 'not specified', '?', or empty, then
       reason_correct_main_path MUST be FALSE.
     - Stating only structural facts ('A connects to B') without WHY is not
       preservation. Generic summaries are not preservation.
  5. **reason_plausible_but_wrong**: true if the response cites rationale that
     matches the DISTRACTOR rationale (from noise/competing branches) rather
     than (or in addition to) the main chain rationale. Sub-rules:
     - If distractor rationale is 'none', then reason_plausible_but_wrong
       MUST be FALSE (no distractors to pick up).
     - If the response cites reasoning that appears in a competing branch
       but NOT in the main causal chain, this is TRUE.
  6. Be lenient on IDs and wording. Be strict on preservation vs inference.

  Answer ONLY with valid JSON, no markdown, no explanation:
  {"task_correct": true/false, "restart_correct": true/false, "restart_exact": true/false, "restart_off_by_one": true/false, "restart_on_competing_branch": true/false, "restart_explained": true/false, "reason_correct_main_path": true/false, "reason_plausible_but_wrong": true/false}

# Max tokens for judge response
judge_max_tokens: 200
