# Variant: lenient judge — accepts partial understanding.
# More lenient than default on reason_preserved (paraphrases accepted).
# Should converge with strict on task_correct and restart_correct.

inference_prompt: |
  You are analyzing a rehydrated context bundle from a graph-based system.
  The bundle contains nodes and relationships reconstructed for agent continuity.

  Key metadata in the graph:
  - Nodes have: node_id, node_kind, title, summary, status, labels
  - Relationships have: relation_type, semantic_class (causal, motivational,
    evidential, procedural, structural), rationale, method, decision_id
  - The causal chain flows from root through related nodes via relationships
  - Rationale fields explain WHY each relationship exists — cite them when present

  ## Rehydrated context

  {rendered_context}

  ## Task

  {question}

  When answering:
  - Trace the causal chain from root to leaf, following relationship types
  - Quote or paraphrase rationale text from relationships when available
  - If no rationale metadata is present, state that explicitly
  - Identify the restart point based on causal evidence, not just position

  Answer in JSON:
  {"failure_point": "the root cause node or event",
  "restart_node": "the node to restart from, with causal justification",
  "reason": "the dominant rationale — quote from context if available"}

judge_prompt: |
  You are an evaluation judge for a context rehydration benchmark.
  The system reconstructs {domain_context} graph context so an AI agent can
  resume work. The graph contains nodes with metadata and relationships with
  semantic_class (causal/motivational/evidential/procedural/structural),
  rationale, and decision_id fields.

  ## LLM Response (from the model under test)
  {llm_response}

  ## Ground Truth
  - Failure point: {expected_failure}
  - Restart node: {expected_restart}
  - Dominant rationale (main causal chain): {expected_reason}
  - Distractor rationale (from noise/competing branches): {distractor_rationale}

  ## Evaluation rules
  1. **Semantic match**: judge by concept and causal role, not exact node IDs.
     Node IDs are synthetic. Match by role and position in the causal chain.
  2. **task_correct**: true if the response identifies a failure point that is
     on the causal chain described in the ground truth. The response must
     demonstrate it traced causality — naming a node without context is not enough.
  3. **restart_correct**: true if the response identifies a restart point on
     the causal chain AND provides a causal justification for WHY. Simply
     naming a node without reasoning is NOT sufficient.
  3a. **restart_exact**: true if the restart node matches the ground truth exactly.
  3b. **restart_off_by_one**: true if the restart node is a direct neighbor (±1 hop) of the ground truth restart on the main chain.
  3c. **restart_on_competing_branch**: true if the restart node is on a distractor/noise branch rather than the main chain.
  3d. **restart_explained**: true if the response provides causal justification for WHY it chose that restart point, regardless of whether the choice is correct.
  4. **reason_correct_main_path**: true if the response references rationale
     concepts from the MAIN causal chain. Loose paraphrases that capture the
     same domain-specific idea count. If the ground truth rationale is 'not
     specified' or empty, must be FALSE.
  5. **reason_plausible_but_wrong**: true if the response cites rationale
     matching DISTRACTOR rationale rather than (or in addition to) the main
     chain. If distractor rationale is 'none', must be FALSE.
  6. Be lenient on reason_correct_main_path. Be fair on task_correct and restart_correct.

  Answer ONLY with valid JSON, no markdown, no explanation:
  {"task_correct": true/false, "restart_correct": true/false, "restart_exact": true/false, "restart_off_by_one": true/false, "restart_on_competing_branch": true/false, "restart_explained": true/false, "reason_correct_main_path": true/false, "reason_plausible_but_wrong": true/false}

judge_max_tokens: 200
