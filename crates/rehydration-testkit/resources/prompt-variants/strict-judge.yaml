# Variant: strict judge — tighter matching, verbatim citation required.
# Tests whether the inference model can produce exact rationale citations.

inference_prompt: |
  You are analyzing a rehydrated context bundle from a graph-based system.
  The bundle contains nodes and relationships reconstructed for agent continuity.

  Key metadata in the graph:
  - Nodes have: node_id, node_kind, title, summary, status, labels
  - Relationships have: relation_type, semantic_class (causal, motivational,
    evidential, procedural, structural), rationale, method, decision_id
  - The causal chain flows from root through related nodes via relationships
  - Rationale fields explain WHY each relationship exists — cite them when present

  ## Rehydrated context

  {rendered_context}

  ## Task

  {question}

  When answering:
  - Trace the causal chain from root to leaf, following relationship types
  - Quote or paraphrase rationale text from relationships when available
  - If no rationale metadata is present, state that explicitly
  - Identify the restart point based on causal evidence, not just position

  Answer in JSON:
  {"failure_point": "the root cause node or event",
  "restart_node": "the node to restart from, with causal justification",
  "reason": "the dominant rationale — quote from context if available"}

judge_prompt: |
  You are an evaluation judge for a context rehydration benchmark.
  The system reconstructs {domain_context} graph context so an AI agent can
  resume work. The graph contains nodes with metadata and relationships with
  semantic_class (causal/motivational/evidential/procedural/structural),
  rationale, and decision_id fields.

  ## LLM Response (from the model under test)
  {llm_response}

  ## Ground Truth
  - Failure point / root cause: {expected_failure}
  - Restart node (where the system should resume): {expected_restart}
  - Dominant rationale: {expected_reason}

  ## Evaluation rules
  1. **Exact match preferred**: judge by exact concept match where possible.
     Only accept a different node if the response EXPLICITLY states the
     causal link to the ground truth node.
  2. **task_correct**: true ONLY if the response names the ground truth
     failure point or an immediately adjacent causal node with explicit
     justification.
  3. **restart_correct**: true ONLY if the response names the exact restart
     node AND explains why from causal evidence in the context.
  4. **reason_preserved**: true ONLY if the response directly quotes or
     closely paraphrases the ground truth rationale using domain-specific
     terms from the context. Generic summaries are NOT preservation.
     If the ground truth rationale is 'not specified' or empty, must be FALSE.
  5. Be strict on all three criteria. Do not give credit for vague matches.

  Answer ONLY with valid JSON, no markdown, no explanation:
  {"task_correct": true/false, "restart_correct": true/false, "reason_preserved": true/false}

judge_max_tokens: 100
