# LLM evaluation prompts for the rehydration kernel benchmark.
#
# Edit these prompts without recompiling. The evaluator loads this file
# at runtime via include_str! (compiled into the binary) or from an
# override path set in LLM_PROMPTS_PATH.
#
# Available placeholders:
#   inference_prompt: {rendered_context}, {question}
#   judge_prompt: {domain_context}, {llm_response}, {expected_failure},
#                 {expected_restart}, {expected_reason}

# Prompt sent to the inference model (GPT-5.4, Claude, vLLM, etc.)
inference_prompt: |
  You are analyzing a rehydrated context bundle from a graph-based system.
  The bundle contains nodes and relationships reconstructed for agent continuity.

  Key metadata in the graph:
  - Nodes have: node_id, node_kind, title, summary, status, labels
  - Relationships have: relation_type, semantic_class (causal, motivational,
    evidential, procedural, structural), rationale, method, decision_id
  - The causal chain flows from root through related nodes via relationships
  - Rationale fields explain WHY each relationship exists — cite them when present

  ## Rehydrated context

  {rendered_context}

  ## Task

  {question}

  When answering:
  - Trace the causal chain from root to leaf, following relationship types
  - Quote or paraphrase rationale text from relationships when available
  - If no rationale metadata is present, state that explicitly
  - Identify the restart point based on causal evidence, not just position

  Answer in JSON:
  {"failure_point": "the root cause node or event",
  "restart_node": "the node to restart from, with causal justification",
  "reason": "the dominant rationale — quote from context if available"}

# Prompt sent to the judge model (Claude Opus 4, GPT-5.4, etc.)
judge_prompt: |
  You are an evaluation judge for a context rehydration benchmark.
  The system reconstructs {domain_context} graph context so an AI agent can
  resume work. The graph contains nodes with metadata and relationships with
  semantic_class (causal/motivational/evidential/procedural/structural),
  rationale, and decision_id fields.

  ## LLM Response (from the model under test)
  {llm_response}

  ## Ground Truth
  - Failure point / root cause: {expected_failure}
  - Restart node (where the system should resume): {expected_restart}
  - Dominant rationale: {expected_reason}

  ## Evaluation rules
  1. **Semantic match**: judge by concept, not exact wording.
     Node IDs like 'chain-0', 'chain-4' are synthetic — match by role/concept.
  2. **task_correct**: true if the response identifies a failure point consistent
     with the ground truth. Multiple valid answers may be listed — matching ANY
     counts as correct.
  3. **restart_correct**: true if the response identifies a plausible restart
     point AND provides a causal justification for WHY. Simply naming a node
     without causal reasoning is NOT sufficient.
  4. **reason_preserved**: true if the response preserves rationale that was
     PRESENT in the rehydrated context. Apply strictly:
     - If the ground truth rationale is a specific phrase, the response must
       paraphrase or reference that concept — clearly derived from context,
       not generic filler.
     - If the ground truth rationale is 'not specified', '?', or empty, then
       reason_preserved MUST be FALSE. The model cannot preserve what was not
       in the context. Plausible inference is not preservation.
     - Citing relationship rationale text, decision IDs, or semantic_class
       metadata is strong evidence of preservation.
     - Stating only structural facts ('A connects to B') without WHY is not.
  5. Be lenient on IDs and wording. Be strict on preservation vs inference.

  Answer ONLY with valid JSON, no markdown, no explanation:
  {"task_correct": true/false, "restart_correct": true/false, "reason_preserved": true/false}

# Max tokens for judge response
judge_max_tokens: 100
