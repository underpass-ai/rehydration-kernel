# Variant: citation-focused agent — instructs inference to quote verbatim.
# Tests whether explicit citation instructions improve reason_preserved.

inference_prompt: |
  You are analyzing a rehydrated context bundle from a graph-based system.
  The bundle contains nodes and relationships reconstructed for agent continuity.

  Key metadata in the graph:
  - Nodes have: node_id, node_kind, title, summary, status, labels
  - Relationships have: relation_type, semantic_class (causal, motivational,
    evidential, procedural, structural), rationale, method, decision_id
  - The causal chain flows from root through related nodes via relationships

  ## Rehydrated context

  {rendered_context}

  ## Task

  {question}

  IMPORTANT — When answering:
  - For failure_point: name the specific node_id from the context
  - For restart_node: name the specific node_id and explain the causal chain
  - For reason: DIRECTLY QUOTE the rationale text from the relationship that
    explains the failure or decision. Use the exact words from the context.
    If multiple rationale fields exist, quote the most relevant one.
    Do NOT summarize or paraphrase — copy the rationale text.

  Answer in JSON:
  {"failure_point": "node_id of the root cause",
  "restart_node": "node_id to restart from, with causal justification",
  "reason": "EXACT QUOTE of the rationale from the context"}

judge_prompt: |
  You are an evaluation judge for a context rehydration benchmark.
  The system reconstructs {domain_context} graph context so an AI agent can
  resume work. The graph contains nodes with metadata and relationships with
  semantic_class (causal/motivational/evidential/procedural/structural),
  rationale, and decision_id fields.

  ## LLM Response (from the model under test)
  {llm_response}

  ## Ground Truth
  - Failure point / root cause: {expected_failure}
  - Restart node (where the system should resume): {expected_restart}
  - Dominant rationale (main causal chain): {expected_reason}
  - Distractor rationale (from noise/competing branches): {distractor_rationale}

  ## Evaluation rules
  1. **Semantic match**: judge by concept and causal role, not exact node IDs.
     Node IDs are synthetic — match by role and position in the causal chain.
     A response naming a causally upstream node (the triggering event instead
     of the resulting decision) is a valid match if the response demonstrates
     it traced the causal path between them.
  2. **task_correct**: true if the response identifies a failure point that is
     EITHER the ground truth OR a causally connected node in the same failure
     chain (upstream trigger, downstream consequence, or the decision linking
     them). The response must show it traced causality, not just named an
     arbitrary node.
  3. **restart_correct**: true if the response identifies a plausible restart
     point AND provides a causal justification for WHY. Simply naming a node
     without causal reasoning is NOT sufficient.
  4. **reason_correct_main_path**: true if the response preserves rationale
     from the MAIN causal chain. Sub-rules:
     - A paraphrase that captures the SAME SPECIFIC concept counts.
     - Citing relationship rationale text, decision IDs, or semantic_class
       metadata from the main chain is strong evidence.
     - If the ground truth rationale is 'not specified', '?', or empty, then
       reason_correct_main_path MUST be FALSE.
     - Stating only structural facts ('A connects to B') without WHY is not
       preservation. Generic summaries are not preservation.
  5. **reason_plausible_but_wrong**: true if the response cites rationale
     matching DISTRACTOR rationale rather than the main chain. If distractor
     rationale is 'none', must be FALSE.
  6. Be lenient on IDs and wording. Be strict on preservation vs inference.

  Answer ONLY with valid JSON, no markdown, no explanation:
  {"task_correct": true/false, "restart_correct": true/false, "reason_correct_main_path": true/false, "reason_plausible_but_wrong": true/false}

judge_max_tokens: 150
