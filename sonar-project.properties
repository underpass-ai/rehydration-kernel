sonar.organization=underpass-ai-swe-ai-fleet
sonar.projectKey=underpass-ai_rehydration-kernel
sonar.projectName=Rehydration Kernel
sonar.sources=api,crates,scripts,.github/workflows
sonar.tests=crates
sonar.test.inclusions=crates/**/tests/**/*.rs,crates/**/src/**/tests.rs
# Test-support crates are intentionally excluded from analysis and coverage.
# They are exercised via container-backed integration tests, not treated as
# production Rust code for Sonar's coverage gate.
sonar.exclusions=target/**,**/Cargo.lock,crates/**/tests/**/*.rs,crates/**/src/**/tests.rs,crates/rehydration-tests-paper/tests/**,crates/rehydration-tests-kernel/tests/**,crates/rehydration-tests-shared/src/**,crates/rehydration-testkit/src/**,crates/rehydration-transport-grpc/src/agentic_reference/**,crates/rehydration-transport-grpc/src/bin/runtime_reference_client/**,scripts/ci/extract-e2e-report.py,scripts/ci/extract-e2e-figures.py
sonar.coverage.exclusions=scripts/**,.github/workflows/**,crates/rehydration-tests-shared/src/**,crates/rehydration-testkit/src/**,crates/rehydration-transport-grpc/src/agentic_reference/**,crates/rehydration-transport-grpc/src/bin/runtime_reference_client/**
sonar.cpd.exclusions=crates/rehydration-transport-grpc/src/starship_e2e.rs
sonar.rust.lcov.reportPaths=target/llvm-cov/lcov.info
sonar.scm.provider=git
