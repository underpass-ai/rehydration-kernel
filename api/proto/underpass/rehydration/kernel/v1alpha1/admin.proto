syntax = "proto3";

package underpass.rehydration.kernel.v1alpha1;

import "google/protobuf/timestamp.proto";
import "underpass/rehydration/kernel/v1alpha1/common.proto";

option go_package = "github.com/underpass-ai/rehydration-kernel/api/gen/go/underpass/rehydration/kernel/v1alpha1;rehydrationkernelv1alpha1";

service ContextAdminService {
  rpc GetProjectionStatus(GetProjectionStatusRequest) returns (GetProjectionStatusResponse);
  rpc ReplayProjection(ReplayProjectionRequest) returns (ReplayProjectionResponse);
  rpc GetBundleSnapshot(GetBundleSnapshotRequest) returns (GetBundleSnapshotResponse);
  rpc GetGraphRelationships(GetGraphRelationshipsRequest) returns (GetGraphRelationshipsResponse);
  rpc GetRehydrationDiagnostics(GetRehydrationDiagnosticsRequest) returns (GetRehydrationDiagnosticsResponse);
}

message GetProjectionStatusRequest {
  repeated string consumer_names = 1;
}

message GetProjectionStatusResponse {
  repeated ProjectionStatus projections = 1;
  google.protobuf.Timestamp observed_at = 2;
}

message ReplayProjectionRequest {
  string consumer_name = 1;
  string stream_name = 2;
  string starting_after = 3;
  uint32 max_events = 4;
  ReplayMode replay_mode = 5;
  string requested_by = 6;
}

message ReplayProjectionResponse {
  string replay_id = 1;
  string consumer_name = 2;
  ReplayMode replay_mode = 3;
  uint32 accepted_events = 4;
  google.protobuf.Timestamp requested_at = 5;
}

message GetBundleSnapshotRequest {
  string case_id = 1;
  string role = 2;
}

message GetBundleSnapshotResponse {
  BundleSnapshot snapshot = 1;
}

message GetGraphRelationshipsRequest {
  string node_id = 1;
  string node_kind = 2;
  uint32 depth = 3;
  bool include_reverse_edges = 4;
}

message GetGraphRelationshipsResponse {
  GraphNode root = 1;
  repeated GraphNode neighbors = 2;
  repeated GraphRelationship relationships = 3;
  google.protobuf.Timestamp observed_at = 4;
}

message GetRehydrationDiagnosticsRequest {
  string case_id = 1;
  repeated string roles = 2;
  Phase phase = 3;
}

message GetRehydrationDiagnosticsResponse {
  repeated RehydrationDiagnostic diagnostics = 1;
  google.protobuf.Timestamp observed_at = 2;
}
