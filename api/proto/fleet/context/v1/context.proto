syntax = "proto3";

package fleet.context.v1;

option go_package = "github.com/underpass-ai/rehydration-kernel/api/gen/go/fleet/context/v1;contextv1";

service ContextService {
  rpc GetContext(GetContextRequest) returns (GetContextResponse);
  rpc UpdateContext(UpdateContextRequest) returns (UpdateContextResponse);
  rpc RehydrateSession(RehydrateSessionRequest) returns (RehydrateSessionResponse);
  rpc ValidateScope(ValidateScopeRequest) returns (ValidateScopeResponse);
  rpc CreateStory(CreateStoryRequest) returns (CreateStoryResponse);
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);
  rpc AddProjectDecision(AddProjectDecisionRequest) returns (AddProjectDecisionResponse);
  rpc TransitionPhase(TransitionPhaseRequest) returns (TransitionPhaseResponse);
  rpc GetGraphRelationships(GetGraphRelationshipsRequest) returns (GetGraphRelationshipsResponse);
}

message GetContextRequest {
  string story_id = 1;
  string role = 2;
  string phase = 3;
  string subtask_id = 4;
  int32 token_budget = 5;
}

message GetContextResponse {
  string context = 1;
  int32 token_count = 2;
  repeated string scopes = 3;
  string version = 4;
  PromptBlocks blocks = 5;
}

message PromptBlocks {
  string system = 1;
  string context = 2;
  string tools = 3;
}

message UpdateContextRequest {
  string story_id = 1;
  string task_id = 2;
  string role = 3;
  repeated ContextChange changes = 4;
  string timestamp = 5;
}

message ContextChange {
  string operation = 1;
  string entity_type = 2;
  string entity_id = 3;
  string payload = 4;
  string reason = 5;
}

message UpdateContextResponse {
  int32 version = 1;
  string hash = 2;
  repeated string warnings = 3;
}

message RehydrateSessionRequest {
  string case_id = 1;
  repeated string roles = 2;
  bool include_timeline = 3;
  bool include_summaries = 4;
  int32 timeline_events = 5;
  bool persist_bundle = 6;
  int32 ttl_seconds = 7;
}

message RehydrateSessionResponse {
  string case_id = 1;
  int64 generated_at_ms = 2;
  map<string, RoleContextPack> packs = 3;
  RehydrationStats stats = 4;
}

message RoleContextPack {
  string role = 1;
  CaseHeader case_header = 2;
  PlanHeader plan_header = 3;
  repeated Subtask subtasks = 4;
  repeated Decision decisions = 5;
  repeated DecisionRelation decision_deps = 6;
  repeated ImpactedSubtask impacted = 7;
  repeated Milestone milestones = 8;
  string last_summary = 9;
  int32 token_budget_hint = 10;
}

message CaseHeader {
  string case_id = 1;
  string title = 2;
  string description = 3;
  string status = 4;
  string created_at = 5;
  string created_by = 6;
}

message PlanHeader {
  string plan_id = 1;
  int32 version = 2;
  string status = 3;
  int32 total_subtasks = 4;
  int32 completed_subtasks = 5;
}

message Subtask {
  string subtask_id = 1;
  string title = 2;
  string description = 3;
  string role = 4;
  string status = 5;
  repeated string dependencies = 6;
  int32 priority = 7;
}

message Decision {
  string id = 1;
  string title = 2;
  string rationale = 3;
  string status = 4;
  string decided_by = 5;
  string decided_at = 6;
}

message DecisionRelation {
  string src_id = 1;
  string dst_id = 2;
  string relation_type = 3;
}

message ImpactedSubtask {
  string decision_id = 1;
  string subtask_id = 2;
  string title = 3;
}

message Milestone {
  string event_type = 1;
  string description = 2;
  int64 ts_ms = 3;
  string actor = 4;
}

message RehydrationStats {
  int32 decisions = 1;
  int32 decision_edges = 2;
  int32 impacts = 3;
  int32 events = 4;
  repeated string roles = 5;
}

message ValidateScopeRequest {
  string role = 1;
  string phase = 2;
  repeated string provided_scopes = 3;
}

message ValidateScopeResponse {
  bool allowed = 1;
  repeated string missing = 2;
  repeated string extra = 3;
  string reason = 4;
}

message CreateStoryRequest {
  string story_id = 1;
  string title = 2;
  string description = 3;
  string initial_phase = 4;
}

message CreateStoryResponse {
  string context_id = 1;
  string story_id = 2;
  string current_phase = 3;
}

message CreateTaskRequest {
  string story_id = 1;
  string task_id = 2;
  string title = 3;
  string description = 4;
  string role = 5;
  repeated string dependencies = 6;
  int32 priority = 7;
  int32 estimated_hours = 8;
}

message CreateTaskResponse {
  string task_id = 1;
  string story_id = 2;
  string status = 3;
}

message AddProjectDecisionRequest {
  string story_id = 1;
  string decision_type = 2;
  string title = 3;
  string rationale = 4;
  string alternatives_considered = 5;
  map<string, string> metadata = 6;
}

message AddProjectDecisionResponse {
  string decision_id = 1;
}

message TransitionPhaseRequest {
  string story_id = 1;
  string from_phase = 2;
  string to_phase = 3;
  string rationale = 4;
}

message TransitionPhaseResponse {
  string story_id = 1;
  string current_phase = 2;
  string transitioned_at = 3;
}

message GetGraphRelationshipsRequest {
  string node_id = 1;
  string node_type = 2;
  int32 depth = 3;
}

message GetGraphRelationshipsResponse {
  GraphNode node = 1;
  repeated GraphNode neighbors = 2;
  repeated GraphRelationship relationships = 3;
  bool success = 4;
  string message = 5;
}

message GraphNode {
  string id = 1;
  repeated string labels = 2;
  map<string, string> properties = 3;
  string type = 4;
  string title = 5;
}

message GraphRelationship {
  string from_node_id = 1;
  string to_node_id = 2;
  string type = 3;
  map<string, string> properties = 4;
}
