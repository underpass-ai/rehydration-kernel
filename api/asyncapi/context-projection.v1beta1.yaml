asyncapi: 2.6.0
id: urn:underpass:rehydration-kernel:context-projection:v1beta1
defaultContentType: application/json
info:
  title: Rehydration Kernel Projection Events
  version: 0.1.0
  description: >
    Versioned event contract for the deterministic context rehydration kernel.
    The projection boundary is node-centric: graph nodes and per-node expanded
    detail can be consumed from any upstream system without coupling the kernel
    to planning-specific concepts.
servers:
  nats:
    url: nats://nats:4222
    protocol: nats
    description: JetStream-compatible message bus used by the kernel.
channels:
  graph.node.materialized:
    description: Upstream system emits a node plus its graph relationships.
    subscribe:
      operationId: onGraphNodeMaterialized
      summary: Consume normalized graph nodes and relations into the projection model.
      message:
        $ref: '#/components/messages/GraphNodeMaterialized'
  graph.relation.materialized:
    description: Upstream system emits a normalized relation between existing or future graph nodes.
    subscribe:
      operationId: onGraphRelationMaterialized
      summary: Consume normalized graph relations into the projection model without re-materializing the source node.
      message:
        $ref: '#/components/messages/GraphRelationMaterialized'
  node.detail.materialized:
    description: Upstream system emits expanded detail for a single node.
    subscribe:
      operationId: onNodeDetailMaterialized
      summary: Consume expanded node detail into the Valkey-backed detail store.
      message:
        $ref: '#/components/messages/NodeDetailMaterialized'
  context.bundle.generated:
    description: Kernel publishes a bundle generation notification.
    publish:
      operationId: publishContextBundleGenerated
      summary: Notify downstream systems that a deterministic bundle was produced.
      message:
        $ref: '#/components/messages/ContextBundleGenerated'
components:
  messages:
    GraphNodeMaterialized:
      name: GraphNodeMaterialized
      title: graph.node.materialized
      payload:
        $ref: '#/components/schemas/GraphNodeMaterializedEvent'
    GraphRelationMaterialized:
      name: GraphRelationMaterialized
      title: graph.relation.materialized
      payload:
        $ref: '#/components/schemas/GraphRelationMaterializedEvent'
    NodeDetailMaterialized:
      name: NodeDetailMaterialized
      title: node.detail.materialized
      payload:
        $ref: '#/components/schemas/NodeDetailMaterializedEvent'
    ContextBundleGenerated:
      name: ContextBundleGenerated
      title: context.bundle.generated
      payload:
        $ref: '#/components/schemas/ContextBundleGeneratedEvent'
  schemas:
    EventEnvelope:
      type: object
      required:
        - event_id
        - correlation_id
        - causation_id
        - occurred_at
        - aggregate_id
        - aggregate_type
        - schema_version
      properties:
        event_id:
          type: string
          description: Globally unique event identifier.
        correlation_id:
          type: string
          description: Correlates work across services.
        causation_id:
          type: string
          description: Immediate triggering command or event identifier.
        occurred_at:
          type: string
          format: date-time
          description: Time when the event became true.
        aggregate_id:
          type: string
          description: Domain aggregate identifier.
        aggregate_type:
          type: string
          description: Domain aggregate type.
        schema_version:
          type: string
          description: Version of the event schema.
    GraphNodeMaterializedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/GraphNodeMaterializedData'
    GraphRelationMaterializedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/GraphRelationMaterializedData'
    GraphNodeMaterializedData:
      type: object
      required:
        - node_id
        - node_kind
        - title
      properties:
        node_id:
          type: string
        node_kind:
          type: string
        title:
          type: string
        summary:
          type: string
        status:
          type: string
        labels:
          type: array
          items:
            type: string
        properties:
          type: object
          additionalProperties:
            type: string
        related_nodes:
          type: array
          items:
            $ref: '#/components/schemas/RelatedNodeReference'
    GraphRelationMaterializedData:
      type: object
      required:
        - source_node_id
        - target_node_id
        - relation_type
        - explanation
      properties:
        source_node_id:
          type: string
        target_node_id:
          type: string
        relation_type:
          type: string
        explanation:
          $ref: '#/components/schemas/RelatedNodeExplanation'
    RelatedNodeReference:
      type: object
      required:
        - node_id
        - relation_type
        - explanation
      properties:
        node_id:
          type: string
        relation_type:
          type: string
        explanation:
          $ref: '#/components/schemas/RelatedNodeExplanation'
    RelatedNodeExplanation:
      type: object
      required:
        - semantic_class
      properties:
        semantic_class:
          type: string
          enum:
            - structural
            - causal
            - motivational
            - procedural
            - evidential
            - constraint
        rationale:
          type: string
        motivation:
          type: string
        method:
          type: string
        decision_id:
          type: string
        caused_by_node_id:
          type: string
        evidence:
          type: string
        confidence:
          type: string
        sequence:
          type: integer
          format: int32
    NodeDetailMaterializedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/NodeDetailMaterializedData'
    NodeDetailMaterializedData:
      type: object
      required:
        - node_id
        - detail
        - content_hash
        - revision
      properties:
        node_id:
          type: string
        detail:
          type: string
        content_hash:
          type: string
        revision:
          type: integer
          format: int64
    ContextBundleGeneratedEvent:
      allOf:
        - $ref: '#/components/schemas/EventEnvelope'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/ContextBundleGeneratedData'
    ContextBundleGeneratedData:
      type: object
      required:
        - root_node_id
        - roles
        - revision
        - content_hash
        - projection_watermark
      properties:
        root_node_id:
          type: string
        roles:
          type: array
          items:
            type: string
        revision:
          type: integer
          format: int64
        content_hash:
          type: string
        projection_watermark:
          type: string
