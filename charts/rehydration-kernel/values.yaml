replicaCount: 1

image:
  repository: ghcr.io/underpass-ai/rehydration-kernel
  pullPolicy: IfNotPresent
  tag: ""
  digest: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  grpcPort: 50054

config:
  serviceName: rehydration-kernel
  grpcBind: 0.0.0.0:50054
  adminBind: 0.0.0.0:8080
  eventsPrefix: rehydration
  enableNats: false
  enableProjectionNats: true

connections:
  graphUri: ""
  detailUri: ""
  snapshotUri: ""
  runtimeStateUri: ""
  natsUrl: ""

secrets:
  existingSecret: ""
  keys:
    graphUri: graphUri
    detailUri: detailUri
    snapshotUri: snapshotUri
    runtimeStateUri: runtimeStateUri
    natsUrl: natsUrl

development:
  allowMutableImageTags: false
  allowInlineConnections: false

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
