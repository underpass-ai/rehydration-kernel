replicaCount: 1

image:
  repository: ghcr.io/underpass-ai/rehydration-kernel
  pullPolicy: IfNotPresent
  tag: ""
  digest: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  grpcPort: 50054
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

tls:
  mode: disabled
  existingSecret: ""
  mountPath: /var/run/rehydration-kernel/tls
  keys:
    cert: tls.crt
    key: tls.key
    clientCa: ca.crt

natsTls:
  mode: disabled
  existingSecret: ""
  mountPath: /var/run/rehydration-kernel/nats-tls
  tlsFirst: false
  keys:
    ca: ""
    cert: ""
    key: ""

valkeyTls:
  enabled: false
  existingSecret: ""
  mountPath: /var/run/rehydration-kernel/valkey-tls
  keys:
    ca: ""
    cert: ""
    key: ""

neo4jTls:
  enabled: false
  existingSecret: ""
  mountPath: /var/run/rehydration-kernel/neo4j-tls
  keys:
    ca: ""

observability:
  logFormat: json
  otlpEndpoint: ""
  serviceName: ""

config:
  serviceName: rehydration-kernel
  grpcBind: 0.0.0.0:50054
  eventsPrefix: rehydration

connections:
  graphUri: ""
  detailUri: ""
  snapshotUri: ""
  runtimeStateUri: ""
  natsUrl: ""

secrets:
  existingSecret: ""
  keys:
    graphUri: graphUri
    detailUri: detailUri
    snapshotUri: snapshotUri
    runtimeStateUri: runtimeStateUri
    natsUrl: natsUrl

development:
  allowMutableImageTags: false
  allowInlineConnections: false

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []

# Optional Loki log aggregation managed by this chart.
loki:
  enabled: false
  image:
    repository: docker.io/grafana/loki
    tag: "3.4.2"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Optional Grafana dashboard managed by this chart.
# Auto-provisions Loki and Prometheus (OTel) datasources when enabled.
# WARNING: Default deploys with anonymous admin access for development convenience.
# For production: set adminPassword and disable anonymous access in extraEnv.
grafana:
  enabled: false
  adminPassword: admin
  anonymousAccess: false
  anonymousRole: Viewer
  image:
    repository: docker.io/grafana/grafana
    tag: "11.6.0"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Optional OpenTelemetry Collector managed by this chart.
# Receives OTLP from the kernel and exports metrics as Prometheus.
otelCollector:
  enabled: false
  image:
    repository: docker.io/otel/opentelemetry-collector-contrib
    tag: "0.127.0"
  tls:
    enabled: false
    existingSecret: ""
    mountPath: /var/run/rehydration-kernel/otel-tls
    keys:
      ca: ca.crt
      cert: tls.crt
      key: tls.key
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# Optional graph database managed by this chart. When enabled together with
# development.allowInlineConnections=true, the kernel can omit connections.graphUri
# and will connect to the release-scoped Neo4j service automatically.
neo4j:
  enabled: false
  auth: "neo4j/underpassai"
  image:
    repository: docker.io/library/neo4j
    tag: "5.14"
  memory:
    pagecache: "512M"
    heapInitial: "512M"
    heapMax: "1G"
  resources:
    requests:
      cpu: 200m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi
  persistence:
    storageClass: local-path
    size: 10Gi
  tls:
    enabled: false
    existingSecret: ""
    caSecret: ""

# Optional NATS server managed by this chart.
nats:
  enabled: false
  image:
    repository: docker.io/library/nats
    tag: "2.10-alpine"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    storageClass: local-path
    size: 5Gi
  tls:
    enabled: false
    existingSecret: ""
    caSecret: ""

# Optional Valkey server managed by this chart.
valkey:
  enabled: false
  image:
    repository: docker.io/valkey/valkey
    tag: "8.1-alpine"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    storageClass: local-path
    size: 5Gi
  tls:
    enabled: false
    existingSecret: ""
    caSecret: ""
