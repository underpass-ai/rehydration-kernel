replicaCount: 1

image:
  repository: ghcr.io/underpass-ai/rehydration-kernel
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  grpcPort: 50054

config:
  serviceName: rehydration-kernel
  grpcBind: 0.0.0.0:50054
  adminBind: 0.0.0.0:8080
  eventsPrefix: rehydration
  enableNats: false

connections:
  graphUri: neo4j://neo4j:7687
  detailUri: redis://valkey:6379
  snapshotUri: redis://valkey:6379
  natsUrl: nats://nats:4222

secrets:
  existingSecret: ""
  keys:
    graphUri: graphUri
    detailUri: detailUri
    snapshotUri: snapshotUri
    natsUrl: natsUrl

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

extraEnv: []
