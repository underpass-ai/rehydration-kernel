# Full mTLS deployment example for underpass-runtime.
#
# All boundaries encrypted with mutual TLS where supported.
# The in-chart Neo4j sidecar is the current exception: it still serves
# plaintext Bolt, so this profile keeps the graph connection on `neo4j://`.
# Use `values.underpass-runtime.secure.example.yaml` when pointing the kernel
# at an external Neo4j endpoint that already exposes TLS.
#
# Option A — automatic certificate generation (recommended):
#   Set certGen.enabled: true below. The pre-install hook generates the CA
#   and all server/client certs automatically.
#
# Option B — manual prerequisites:
#   kubectl create secret tls rehydration-kernel-grpc-tls \
#     --cert=server.crt --key=server.key -n underpass-runtime
#   kubectl create secret generic rehydration-kernel-nats-tls \
#     --from-file=tls.crt=nats.crt --from-file=tls.key=nats.key --from-file=ca.crt \
#     -n underpass-runtime
#   kubectl create secret generic rehydration-kernel-nats-ca \
#     --from-file=ca.crt -n underpass-runtime
#   kubectl create secret generic rehydration-kernel-valkey-tls \
#     --from-file=tls.crt=valkey.crt --from-file=tls.key=valkey.key --from-file=ca.crt \
#     -n underpass-runtime
#   kubectl create secret generic rehydration-kernel-valkey-ca \
#     --from-file=ca.crt -n underpass-runtime
#   kubectl create secret generic rehydration-kernel-client-tls \
#     --from-file=tls.crt=client.crt --from-file=tls.key=client.key --from-file=ca.crt \
#     -n underpass-runtime

# Uncomment to enable automatic cert generation:
# certGen:
#   enabled: true

image:
  pullPolicy: Always

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: GRPC
  hosts:
    - host: rehydration-kernel.underpassai.com
      paths:
        - path: /
          pathType: Prefix

development:
  allowMutableImageTags: true
  allowInlineConnections: true

connections:
  graphUri: "neo4j://neo4j:underpassai@rehydration-kernel-neo4j:7687"
  detailUri: "rediss://rehydration-kernel-valkey:6379"
  snapshotUri: "rediss://rehydration-kernel-valkey:6379"
  runtimeStateUri: "rediss://rehydration-kernel-valkey:6379"
  natsUrl: "nats://rehydration-kernel-nats:4222"

# --- gRPC inbound mTLS ---
tls:
  mode: mutual
  existingSecret: rehydration-kernel-grpc-tls
  keys:
    cert: tls.crt
    key: tls.key
    clientCa: ca.crt

# --- NATS mTLS ---
nats:
  enabled: true
  tls:
    enabled: true
    existingSecret: rehydration-kernel-nats-tls
    caSecret: rehydration-kernel-nats-ca

natsTls:
  mode: mutual
  existingSecret: rehydration-kernel-client-tls
  tlsFirst: false
  keys:
    ca: ca.crt
    cert: tls.crt
    key: tls.key

# --- Valkey mTLS ---
valkey:
  enabled: true
  tls:
    enabled: true
    existingSecret: rehydration-kernel-valkey-tls
    caSecret: rehydration-kernel-valkey-ca

valkeyTls:
  enabled: true
  existingSecret: rehydration-kernel-client-tls
  keys:
    ca: ca.crt
    cert: tls.crt
    key: tls.key

# --- Neo4j today ---
# The self-contained Neo4j subchart still serves plaintext Bolt.
# Leave Neo4j TLS disabled in this profile.
neo4j:
  enabled: true
  auth: "neo4j/underpassai"
  tls:
    enabled: false

neo4jTls:
  enabled: false
  existingSecret: ""
  keys:
    ca: ""
    cert: ""
    key: ""

# --- Observability stack with mTLS ---
loki:
  enabled: true

grafana:
  enabled: true
  adminPassword: change-me-in-production
  anonymousAccess: false

otelCollector:
  enabled: true
  tls:
    enabled: true
    existingSecret: rehydration-kernel-otel-tls
    keys:
      ca: ca.crt
      cert: tls.crt
      key: tls.key

# --- Kernel OTLP mTLS env vars ---
# These are set automatically via extraEnv since the Helm chart
# auto-wires OTEL_EXPORTER_OTLP_ENDPOINT but not the TLS paths.
extraEnv:
  - name: OTEL_EXPORTER_OTLP_CA_PATH
    value: /var/run/rehydration-kernel/otel-tls/ca.crt
  - name: OTEL_EXPORTER_OTLP_CERT_PATH
    value: /var/run/rehydration-kernel/otel-tls/tls.crt
  - name: OTEL_EXPORTER_OTLP_KEY_PATH
    value: /var/run/rehydration-kernel/otel-tls/tls.key
