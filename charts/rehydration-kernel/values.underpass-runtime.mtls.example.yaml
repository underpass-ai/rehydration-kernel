# Full mTLS deployment example for underpass-runtime.
#
# All boundaries encrypted with mutual TLS where supported.
# Requires secrets pre-created in the namespace:
#
#   kubectl create secret tls grpc-tls --cert=server.crt --key=server.key -n underpass-runtime
#   kubectl create secret generic grpc-ca --from-file=ca.crt -n underpass-runtime
#   kubectl create secret tls nats-tls --cert=nats.crt --key=nats.key -n underpass-runtime
#   kubectl create secret generic nats-ca --from-file=ca.crt -n underpass-runtime
#   kubectl create secret tls valkey-tls --cert=valkey.crt --key=valkey.key -n underpass-runtime
#   kubectl create secret generic valkey-ca --from-file=ca.crt -n underpass-runtime
#   kubectl create secret tls otel-tls --cert=otel.crt --key=otel.key -n underpass-runtime
#   kubectl create secret generic neo4j-tls --from-file=ca.crt -n underpass-runtime

image:
  pullPolicy: Always

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: GRPC
  hosts:
    - host: rehydration-kernel.underpassai.com
      paths:
        - path: /
          pathType: Prefix

development:
  allowMutableImageTags: true
  allowInlineConnections: true

connections:
  graphUri: "neo4j+s://neo4j:underpassai@rehydration-kernel-neo4j:7687"
  detailUri: "rediss://rehydration-kernel-valkey:6379"
  snapshotUri: "rediss://rehydration-kernel-valkey:6379"
  runtimeStateUri: "rediss://rehydration-kernel-valkey:6379"
  natsUrl: "nats://rehydration-kernel-nats:4222"

# --- gRPC inbound mTLS ---
tls:
  mode: mutual
  existingSecret: rehydration-kernel-grpc-tls
  keys:
    cert: tls.crt
    key: tls.key
    clientCa: ca.crt

# --- NATS mTLS ---
nats:
  enabled: true
  tls:
    enabled: true
    existingSecret: rehydration-kernel-nats-tls
    caSecret: rehydration-kernel-nats-ca

natsTls:
  mode: mutual
  existingSecret: rehydration-kernel-nats-tls
  tlsFirst: false
  keys:
    ca: ca.crt
    cert: tls.crt
    key: tls.key

# --- Valkey mTLS ---
valkey:
  enabled: true
  tls:
    enabled: true
    existingSecret: rehydration-kernel-valkey-tls
    caSecret: rehydration-kernel-valkey-ca

valkeyTls:
  enabled: true
  existingSecret: rehydration-kernel-valkey-tls
  keys:
    ca: ca.crt
    cert: tls.crt
    key: tls.key

# --- Neo4j TLS (CA trust only — mTLS pending neo4rs upgrade) ---
neo4j:
  enabled: true
  auth: "neo4j/underpassai"
  tls:
    enabled: true
    existingSecret: rehydration-kernel-neo4j-tls
    caSecret: neo4j-tls

neo4jTls:
  enabled: true
  existingSecret: rehydration-kernel-neo4j-tls
  keys:
    ca: ca.crt
    # cert and key pending neo4rs 0.8 driver support
    cert: ""
    key: ""

# --- Observability stack with mTLS ---
loki:
  enabled: true

grafana:
  enabled: true
  adminPassword: change-me-in-production
  anonymousAccess: false

otelCollector:
  enabled: true
  tls:
    enabled: true
    existingSecret: rehydration-kernel-otel-tls
    keys:
      ca: ca.crt
      cert: tls.crt
      key: tls.key

# --- Kernel OTLP mTLS env vars ---
# The Helm chart auto-wires OTEL_EXPORTER_OTLP_ENDPOINT and mounts the OTel TLS
# secret into the kernel pod. These env vars point the OTLP exporter at those
# mounted files.
extraEnv:
  - name: OTEL_EXPORTER_OTLP_CA_PATH
    value: /var/run/rehydration-kernel/otel-tls/ca.crt
  - name: OTEL_EXPORTER_OTLP_CERT_PATH
    value: /var/run/rehydration-kernel/otel-tls/tls.crt
  - name: OTEL_EXPORTER_OTLP_KEY_PATH
    value: /var/run/rehydration-kernel/otel-tls/tls.key

# --- Optional in-cluster LLM endpoints ---
# Apply k8s/llm-client-config.example.yaml first, then load the config and
# secret through envFrom. This keeps the primary model, repair judge, and
# semantic reranker outside the chart's static values.
extraEnvFrom:
  - configMapRef:
      name: rehydration-kernel-llm-client
  - secretRef:
      name: rehydration-kernel-llm-client-secrets
