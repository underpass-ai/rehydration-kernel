image:
  pullPolicy: Always

imagePullSecrets:
  - name: ghcr-pull

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: GRPC
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
  hosts:
    - host: rehydration-kernel.underpassai.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - rehydration-kernel.underpassai.com
      secretName: rehydration-kernel-tls-prod

development:
  allowMutableImageTags: true
  allowInlineConnections: true

# Self-contained infrastructure — all managed by this chart.
neo4j:
  enabled: true
  auth: "neo4j/underpassai"

nats:
  enabled: true

valkey:
  enabled: true

loki:
  enabled: true

grafana:
  enabled: true
  anonymousAccess: true  # development only — disable in production

otelCollector:
  enabled: true

e2e:
  enabled: true
