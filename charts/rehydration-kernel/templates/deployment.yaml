{{- include "rehydration-kernel.validateValues" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rehydration-kernel.fullname" . }}
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rehydration-kernel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "rehydration-kernel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "rehydration-kernel.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: rehydration-kernel
          image: "{{ include "rehydration-kernel.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP
          env:
            - name: REHYDRATION_SERVICE_NAME
              value: {{ .Values.config.serviceName | quote }}
            - name: REHYDRATION_GRPC_BIND
              value: {{ .Values.config.grpcBind | quote }}
            - name: REHYDRATION_GRPC_TLS_MODE
              value: {{ .Values.tls.mode | quote }}
            {{- if ne .Values.tls.mode "disabled" }}
            - name: REHYDRATION_GRPC_TLS_CERT_PATH
              value: {{ printf "%s/%s" .Values.tls.mountPath .Values.tls.keys.cert | quote }}
            - name: REHYDRATION_GRPC_TLS_KEY_PATH
              value: {{ printf "%s/%s" .Values.tls.mountPath .Values.tls.keys.key | quote }}
            {{- if eq .Values.tls.mode "mutual" }}
            - name: REHYDRATION_GRPC_TLS_CLIENT_CA_PATH
              value: {{ printf "%s/%s" .Values.tls.mountPath .Values.tls.keys.clientCa | quote }}
            {{- end }}
            {{- end }}
            - name: REHYDRATION_EVENTS_PREFIX
              value: {{ .Values.config.eventsPrefix | quote }}
            - name: REHYDRATION_LOG_FORMAT
              value: {{ .Values.observability.logFormat | quote }}
            {{- if .Values.otelCollector.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://{{ include "rehydration-kernel.fullname" . }}-otel-collector:4317"
            {{- else if ne (default "" .Values.observability.otlpEndpoint) "" }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint | quote }}
            {{- end }}
            {{- if ne (default "" .Values.observability.serviceName) "" }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.observability.serviceName | quote }}
            {{- end }}
            {{- if ne .Values.natsTls.mode "disabled" }}
            - name: NATS_TLS_MODE
              value: {{ .Values.natsTls.mode | quote }}
            {{- if .Values.natsTls.tlsFirst }}
            - name: NATS_TLS_FIRST
              value: "true"
            {{- end }}
            {{- if and .Values.natsTls.existingSecret (ne .Values.natsTls.keys.ca "") }}
            - name: NATS_TLS_CA_PATH
              value: {{ printf "%s/%s" .Values.natsTls.mountPath .Values.natsTls.keys.ca | quote }}
            {{- end }}
            {{- if and .Values.natsTls.existingSecret (ne .Values.natsTls.keys.cert "") (ne .Values.natsTls.keys.key "") }}
            - name: NATS_TLS_CERT_PATH
              value: {{ printf "%s/%s" .Values.natsTls.mountPath .Values.natsTls.keys.cert | quote }}
            - name: NATS_TLS_KEY_PATH
              value: {{ printf "%s/%s" .Values.natsTls.mountPath .Values.natsTls.keys.key | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.secrets.existingSecret }}
            - name: REHYDRATION_GRAPH_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: {{ .Values.secrets.keys.graphUri | quote }}
            - name: REHYDRATION_DETAIL_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: {{ .Values.secrets.keys.detailUri | quote }}
            - name: REHYDRATION_SNAPSHOT_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: {{ .Values.secrets.keys.snapshotUri | quote }}
            - name: REHYDRATION_RUNTIME_STATE_URI
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: {{ .Values.secrets.keys.runtimeStateUri | quote }}
            - name: NATS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: {{ .Values.secrets.keys.natsUrl | quote }}
            {{- else if .Values.development.allowInlineConnections }}
            - name: REHYDRATION_GRAPH_URI
              value: {{ include "rehydration-kernel.inlineGraphUri" (dict "uri" (default (include "rehydration-kernel.neo4j.uri" .) .Values.connections.graphUri) "tls" .Values.neo4jTls) | quote }}
            - name: REHYDRATION_DETAIL_URI
              value: {{ include "rehydration-kernel.inlineValkeyUri" (dict "uri" (default (include "rehydration-kernel.valkey.uri" .) .Values.connections.detailUri) "tls" .Values.valkeyTls) | quote }}
            - name: REHYDRATION_SNAPSHOT_URI
              value: {{ include "rehydration-kernel.inlineValkeyUri" (dict "uri" (default (include "rehydration-kernel.valkey.uri" .) .Values.connections.snapshotUri) "tls" .Values.valkeyTls) | quote }}
            - name: REHYDRATION_RUNTIME_STATE_URI
              value: {{ include "rehydration-kernel.inlineValkeyUri" (dict "uri" (default (include "rehydration-kernel.valkey.uri" .) .Values.connections.runtimeStateUri) "tls" .Values.valkeyTls) | quote }}
            - name: NATS_URL
              value: {{ default (include "rehydration-kernel.nats.uri" .) .Values.connections.natsUrl | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or (ne .Values.tls.mode "disabled") .Values.natsTls.existingSecret .Values.valkeyTls.existingSecret .Values.neo4jTls.existingSecret }}
          volumeMounts:
            {{- if ne .Values.tls.mode "disabled" }}
            - name: grpc-tls
              mountPath: {{ .Values.tls.mountPath | quote }}
              readOnly: true
            {{- end }}
            {{- if .Values.natsTls.existingSecret }}
            - name: nats-tls
              mountPath: {{ .Values.natsTls.mountPath | quote }}
              readOnly: true
            {{- end }}
            {{- if .Values.valkeyTls.existingSecret }}
            - name: valkey-tls
              mountPath: {{ .Values.valkeyTls.mountPath | quote }}
              readOnly: true
            {{- end }}
            {{- if .Values.neo4jTls.existingSecret }}
            - name: neo4j-tls
              mountPath: {{ .Values.neo4jTls.mountPath | quote }}
              readOnly: true
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if or (ne .Values.tls.mode "disabled") .Values.natsTls.existingSecret .Values.valkeyTls.existingSecret .Values.neo4jTls.existingSecret }}
      volumes:
        {{- if ne .Values.tls.mode "disabled" }}
        - name: grpc-tls
          secret:
            secretName: {{ .Values.tls.existingSecret | quote }}
        {{- end }}
        {{- if .Values.natsTls.existingSecret }}
        - name: nats-tls
          secret:
            secretName: {{ .Values.natsTls.existingSecret | quote }}
        {{- end }}
        {{- if .Values.valkeyTls.existingSecret }}
        - name: valkey-tls
          secret:
            secretName: {{ .Values.valkeyTls.existingSecret | quote }}
        {{- end }}
        {{- if .Values.neo4jTls.existingSecret }}
        - name: neo4j-tls
          secret:
            secretName: {{ .Values.neo4jTls.existingSecret | quote }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
