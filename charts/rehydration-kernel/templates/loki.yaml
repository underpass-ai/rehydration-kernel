{{- if .Values.loki.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rehydration-kernel.fullname" . }}-loki
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "rehydration-kernel.fullname" . }}-loki
  ports:
    - port: 3100
      targetPort: 3100
      protocol: TCP
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rehydration-kernel.fullname" . }}-loki
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "rehydration-kernel.fullname" . }}-loki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "rehydration-kernel.fullname" . }}-loki
    spec:
      containers:
        - name: loki
          image: "{{ .Values.loki.image.repository }}:{{ .Values.loki.image.tag }}"
          args:
            - "-config.file=/etc/loki/local-config.yaml"
            - "-target=all"
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
          resources:
            {{- toYaml .Values.loki.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "rehydration-kernel.fullname" . }}-loki-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rehydration-kernel.fullname" . }}-loki-config
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
data:
  local-config.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory
      replication_factor: 1
      path_prefix: /loki
    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage_config:
      filesystem:
        directory: /loki/chunks
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true
{{- end }}
