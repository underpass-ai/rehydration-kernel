{{- if .Values.neo4j.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rehydration-kernel.fullname" . }}-neo4j-auth
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
type: Opaque
stringData:
  NEO4J_AUTH: {{ .Values.neo4j.auth | quote }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "rehydration-kernel.neo4j.fullname" . }}
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  replicas: 1
  serviceName: {{ include "rehydration-kernel.neo4j.fullname" . }}
  selector:
    matchLabels:
      {{- include "rehydration-kernel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: neo4j
  template:
    metadata:
      labels:
        {{- include "rehydration-kernel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: neo4j
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 7474
        runAsGroup: 7474
        fsGroup: 7474
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: neo4j
          image: {{ .Values.neo4j.image.repository }}:{{ .Values.neo4j.image.tag }}
          imagePullPolicy: IfNotPresent
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: {{ include "rehydration-kernel.fullname" . }}-neo4j-auth
                  key: NEO4J_AUTH
            - name: NEO4J_dbms_memory_pagecache_size
              value: {{ .Values.neo4j.memory.pagecache | quote }}
            - name: NEO4J_dbms_memory_heap_initial__size
              value: {{ .Values.neo4j.memory.heapInitial | quote }}
            - name: NEO4J_dbms_memory_heap_max__size
              value: {{ .Values.neo4j.memory.heapMax | quote }}
            - name: NEO4J_server_default__listen__address
              value: "0.0.0.0"
            - name: NEO4J_server_bolt_listen__address
              value: "0.0.0.0:7687"
            - name: NEO4J_server_http_listen__address
              value: "0.0.0.0:7474"
          ports:
            - name: http
              containerPort: 7474
            - name: bolt
              containerPort: 7687
          resources:
            {{- toYaml .Values.neo4j.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 7687
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 7474
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
        labels:
          {{- include "rehydration-kernel.labels" . | nindent 10 }}
          app.kubernetes.io/component: neo4j
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.neo4j.persistence.storageClass | quote }}
        resources:
          requests:
            storage: {{ .Values.neo4j.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rehydration-kernel.neo4j.fullname" . }}
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
spec:
  selector:
    {{- include "rehydration-kernel.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: http
      port: 7474
      targetPort: 7474
{{- end }}
