{{- if .Values.e2e.enabled }}
{{- $fullName := include "rehydration-kernel.fullname" . }}
{{- $labels := include "rehydration-kernel.labels" . }}
{{- $e2e := .Values.e2e }}
{{- $imageRepo := $e2e.image.repository }}
{{- $imageTag := $e2e.image.tag | default .Chart.AppVersion }}
{{- $imagePull := $e2e.image.pullPolicy }}
{{- $tlsSecret := $e2e.clientTlsSecret }}
{{- $grpcPort := .Values.service.grpcPort | default 50054 }}
{{- range $e2e.tests }}
---
apiVersion: v1
kind: Pod
metadata:
  name: "{{ $fullName }}-e2e-{{ .name }}"
  labels:
    {{- $labels | nindent 4 }}
    test-type: e2e
    test-id: {{ .id | quote }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  activeDeadlineSeconds: {{ .timeout | default 120 }}
  automountServiceAccountToken: false
  {{- with $.Values.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  volumes:
    - name: tmp
      emptyDir: {}
    - name: e2e-tls
      secret:
        secretName: {{ $tlsSecret }}
  containers:
    - name: runner
      image: "{{ $imageRepo }}:{{ $imageTag }}"
      imagePullPolicy: {{ $imagePull }}
      volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: e2e-tls
          mountPath: /var/run/e2e-tls
          readOnly: true
      env:
        - name: TEST_ID
          value: {{ .id | quote }}
        - name: KERNEL_HOST
          value: "{{ $fullName }}.{{ $.Release.Namespace }}.svc.cluster.local"
        - name: KERNEL_PORT
          value: {{ $grpcPort | quote }}
        - name: TLS_CA
          value: "/var/run/e2e-tls/ca.crt"
        - name: TLS_CERT
          value: "/var/run/e2e-tls/tls.crt"
        - name: TLS_KEY
          value: "/var/run/e2e-tls/tls.key"
        {{- with $e2e.extraEnv }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with $e2e.extraEnvFrom }}
      envFrom:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop: ["ALL"]
        seccompProfile:
          type: RuntimeDefault
{{- end }}
{{- end }}
