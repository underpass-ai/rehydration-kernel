{{- if .Values.valkey.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rehydration-kernel.fullname" . }}-valkey
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "rehydration-kernel.fullname" . }}-valkey
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: client
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rehydration-kernel.fullname" . }}-valkey-data
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.valkey.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.valkey.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rehydration-kernel.fullname" . }}-valkey
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "rehydration-kernel.fullname" . }}-valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "rehydration-kernel.fullname" . }}-valkey
    spec:
      containers:
        - name: valkey
          image: "{{ .Values.valkey.image.repository }}:{{ .Values.valkey.image.tag }}"
          {{- if .Values.valkey.tls.enabled }}
          args:
            - "--tls-port"
            - "6379"
            - "--port"
            - "0"
            - "--tls-cert-file"
            - "/etc/valkey-tls/tls.crt"
            - "--tls-key-file"
            - "/etc/valkey-tls/tls.key"
            - "--tls-ca-cert-file"
            - "/etc/valkey-tls-ca/ca.crt"
            - "--tls-auth-clients"
            - "yes"
            - "--save"
            - ""
            - "--appendonly"
            - "yes"
          {{- else }}
          args: ["--save", "", "--appendonly", "yes"]
          {{- end }}
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.valkey.tls.enabled }}
            - name: valkey-tls
              mountPath: /etc/valkey-tls
              readOnly: true
            - name: valkey-tls-ca
              mountPath: /etc/valkey-tls-ca
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "rehydration-kernel.fullname" . }}-valkey-data
        {{- if .Values.valkey.tls.enabled }}
        - name: valkey-tls
          secret:
            secretName: {{ .Values.valkey.tls.existingSecret | quote }}
        - name: valkey-tls-ca
          secret:
            secretName: {{ .Values.valkey.tls.caSecret | quote }}
        {{- end }}
{{- end }}
