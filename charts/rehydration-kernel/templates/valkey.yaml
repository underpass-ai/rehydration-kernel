{{- if .Values.valkey.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rehydration-kernel.fullname" . }}-valkey
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "rehydration-kernel.fullname" . }}-valkey
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: client
    {{- if .Values.valkey.exporter.enabled }}
    - port: {{ .Values.valkey.exporter.port }}
      targetPort: {{ .Values.valkey.exporter.port }}
      protocol: TCP
      name: metrics
    {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rehydration-kernel.fullname" . }}-valkey-data
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.valkey.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.valkey.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rehydration-kernel.fullname" . }}-valkey
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "rehydration-kernel.fullname" . }}-valkey
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "rehydration-kernel.fullname" . }}-valkey
    spec:
      containers:
        - name: valkey
          image: "{{ .Values.valkey.image.repository }}:{{ .Values.valkey.image.tag }}"
          {{- if .Values.valkey.tls.enabled }}
          args:
            - "--tls-port"
            - "6379"
            - "--port"
            - "0"
            - "--tls-cert-file"
            - "/etc/valkey-tls/tls.crt"
            - "--tls-key-file"
            - "/etc/valkey-tls/tls.key"
            - "--tls-ca-cert-file"
            - "/etc/valkey-tls-ca/ca.crt"
            - "--tls-auth-clients"
            - "yes"
            - "--save"
            - ""
            - "--appendonly"
            - "yes"
          {{- else }}
          args: ["--save", "", "--appendonly", "yes"]
          {{- end }}
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if .Values.valkey.tls.enabled }}
            - name: valkey-tls
              mountPath: /etc/valkey-tls
              readOnly: true
            - name: valkey-tls-ca
              mountPath: /etc/valkey-tls-ca
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.valkey.resources | nindent 12 }}
        {{- if .Values.valkey.exporter.enabled }}
        - name: valkey-exporter
          image: "{{ .Values.valkey.exporter.image.repository }}:{{ .Values.valkey.exporter.image.tag }}"
          ports:
            - containerPort: {{ .Values.valkey.exporter.port }}
              name: metrics
          env:
            {{- if .Values.valkey.tls.enabled }}
            - name: REDIS_ADDR
              value: "rediss://localhost:6379"
            - name: REDIS_EXPORTER_TLS_CLIENT_CERT_FILE
              value: /etc/valkey-tls/tls.crt
            - name: REDIS_EXPORTER_TLS_CLIENT_KEY_FILE
              value: /etc/valkey-tls/tls.key
            - name: REDIS_EXPORTER_TLS_CA_CERT_FILE
              value: /etc/valkey-tls-ca/ca.crt
            - name: REDIS_EXPORTER_SKIP_TLS_VERIFICATION
              value: "true"
            - name: REDIS_EXPORTER_SET_CLIENT_NAME
              value: "false"
            {{- else }}
            - name: REDIS_ADDR
              value: "redis://localhost:6379"
            {{- end }}
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          {{- if .Values.valkey.tls.enabled }}
          volumeMounts:
            - name: valkey-tls
              mountPath: /etc/valkey-tls
              readOnly: true
            - name: valkey-tls-ca
              mountPath: /etc/valkey-tls-ca
              readOnly: true
          {{- end }}
        {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "rehydration-kernel.fullname" . }}-valkey-data
        {{- if .Values.valkey.tls.enabled }}
        - name: valkey-tls
          secret:
            secretName: {{ .Values.valkey.tls.existingSecret | quote }}
        - name: valkey-tls-ca
          secret:
            secretName: {{ .Values.valkey.tls.caSecret | quote }}
        {{- end }}
{{- end }}
