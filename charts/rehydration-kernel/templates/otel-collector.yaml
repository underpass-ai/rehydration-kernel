{{- if .Values.otelCollector.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rehydration-kernel.otel.fullname" . }}
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "rehydration-kernel.otelCollector.fullname" . }}
  ports:
    - port: 4317
      targetPort: 4317
      protocol: TCP
      name: otlp-grpc
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: prometheus
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rehydration-kernel.otelCollector.fullname" . }}
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "rehydration-kernel.otelCollector.fullname" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "rehydration-kernel.otelCollector.fullname" . }}
    spec:
      containers:
        - name: otel-collector
          image: "{{ .Values.otelCollector.image.repository }}:{{ .Values.otelCollector.image.tag }}"
          args:
            - "--config=/etc/otel/config.yaml"
          ports:
            - containerPort: 4317
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/otel
            {{- if and .Values.otelCollector.tls.enabled .Values.otelCollector.tls.existingSecret }}
            - name: otel-tls
              mountPath: {{ .Values.otelCollector.tls.mountPath }}
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.otelCollector.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "rehydration-kernel.otelCollector.fullname" . }}-config
        {{- if and .Values.otelCollector.tls.enabled .Values.otelCollector.tls.existingSecret }}
        - name: otel-tls
          secret:
            secretName: {{ .Values.otelCollector.tls.existingSecret }}
        {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rehydration-kernel.otelCollector.fullname" . }}-config
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            {{- if .Values.otelCollector.tls.enabled }}
            tls:
              cert_file: {{ .Values.otelCollector.tls.mountPath }}/{{ .Values.otelCollector.tls.keys.cert }}
              key_file: {{ .Values.otelCollector.tls.mountPath }}/{{ .Values.otelCollector.tls.keys.key }}
              client_ca_file: {{ .Values.otelCollector.tls.mountPath }}/{{ .Values.otelCollector.tls.keys.ca }}
            {{- end }}
      {{- if or (and .Values.valkey.enabled .Values.valkey.exporter.enabled) (and .Values.nats.enabled .Values.nats.exporter.enabled) }}
      prometheus:
        config:
          scrape_configs:
            {{- if and .Values.valkey.enabled .Values.valkey.exporter.enabled }}
            - job_name: valkey
              scrape_interval: 15s
              static_configs:
                - targets:
                    - {{ include "rehydration-kernel.fullname" . }}-valkey:{{ .Values.valkey.exporter.port }}
            {{- end }}
            {{- if and .Values.nats.enabled .Values.nats.exporter.enabled }}
            - job_name: nats
              scrape_interval: 15s
              static_configs:
                - targets:
                    - {{ include "rehydration-kernel.fullname" . }}-nats:{{ .Values.nats.exporter.port }}
            {{- end }}
      {{- end }}
    processors:
      batch:
        timeout: 5s
    exporters:
      prometheus:
        endpoint: 0.0.0.0:9090
        namespace: rehydration
      {{- if .Values.loki.enabled }}
      loki:
        {{- if .Values.otelCollector.tls.enabled }}
        endpoint: https://{{ include "rehydration-kernel.fullname" . }}-loki:3100/loki/api/v1/push
        tls:
          cert_file: {{ .Values.otelCollector.tls.mountPath }}/{{ .Values.otelCollector.tls.keys.cert }}
          key_file: {{ .Values.otelCollector.tls.mountPath }}/{{ .Values.otelCollector.tls.keys.key }}
          ca_file: {{ .Values.otelCollector.tls.mountPath }}/{{ .Values.otelCollector.tls.keys.ca }}
        {{- else }}
        endpoint: http://{{ include "rehydration-kernel.fullname" . }}-loki:3100/loki/api/v1/push
        {{- end }}
      {{- end }}
    service:
      pipelines:
        metrics:
          receivers:
            - otlp
            {{- if or (and .Values.valkey.enabled .Values.valkey.exporter.enabled) (and .Values.nats.enabled .Values.nats.exporter.enabled) }}
            - prometheus
            {{- end }}
          processors: [batch]
          exporters: [prometheus]
        {{- if .Values.loki.enabled }}
        logs:
          receivers: [otlp]
          processors: [batch]
          exporters: [loki]
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rehydration-kernel.otelCollector.fullname" . }}
  labels:
    {{- include "rehydration-kernel.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "rehydration-kernel.otelCollector.fullname" . }}
  ports:
    - port: 4317
      targetPort: 4317
      protocol: TCP
      name: otlp-grpc
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: prometheus
{{- end }}
