apiVersion: batch/v1
kind: Job
metadata:
  name: kop-nemotronflash3b-lora-lme-v7-20260513
  labels:
    app.kubernetes.io/name: kop-nemotronflash3b-lora-lme-v7-20260513
    app.kubernetes.io/part-of: underpass-kmp
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kop-nemotronflash3b-lora-lme-v7-20260513
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: ghcr.io/underpass-ai/operator-nemotron:torch2.9.1-cuda13.0-sm80-20260513
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/repo
          env:
            - name: HF_HOME
              value: /host-tmp/huggingface
            - name: TRANSFORMERS_CACHE
              value: /host-tmp/huggingface/transformers
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: expandable_segments:True
            - name: MAX_JOBS
              value: "4"
            - name: TORCH_CUDA_ARCH_LIST
              value: "8.0"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: HF_TOKEN
          command:
            - bash
            - -lc
          args:
            - |
              set -euo pipefail
              rm -rf /host-tmp/kernel-operator-nemotronflash3b-lora-longmemeval-legacy-v7-20260513
              python scripts/operator/train_operator_sft_lora.py \
                --train-jsonl /host-tmp/kernel-operator-sft-longmemeval-legacy-v7-20260513/openai_train.jsonl \
                --eval-jsonl /host-tmp/kernel-operator-sft-longmemeval-legacy-v7-20260513/openai_eval.jsonl \
                --model-id nvidia/Nemotron-Flash-3B-Instruct \
                --output-dir /host-tmp/kernel-operator-nemotronflash3b-lora-longmemeval-legacy-v7-20260513 \
                --trust-remote-code \
                --torch-dtype float16 \
                --config-override attn_implementation_new=flash_attention_2 \
                --config-override use_mamba_kernels=true \
                --lora-target-modules all-linear \
                --lora-r 8 \
                --lora-alpha 16 \
                --epochs 3 \
                --batch-size 1 \
                --grad-accum 16 \
                --max-length 2048 \
                --fp16
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: 64Gi
            requests:
              nvidia.com/gpu: "1"
              cpu: "6"
              memory: 40Gi
          volumeMounts:
            - name: repo
              mountPath: /workspace/repo
            - name: host-tmp
              mountPath: /host-tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/tirso/ai/developents/rehydration-kernel
            type: Directory
        - name: host-tmp
          hostPath:
            path: /tmp
            type: Directory
