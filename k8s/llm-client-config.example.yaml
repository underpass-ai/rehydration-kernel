apiVersion: v1
kind: ConfigMap
metadata:
  name: rehydration-kernel-llm-client
  namespace: underpass-runtime
data:
  LLM_ENDPOINT: http://vllm-qwen35-9b:8000/v1/chat/completions
  LLM_MODEL: Qwen/Qwen3.5-9B
  LLM_PROVIDER: openai
  LLM_TEMPERATURE: "0.0"
  LLM_ENABLE_THINKING: "false"
  # In-cluster jobs should prefer the dedicated repair judge service.
  # For external smoke, use:
  # https://vllm-repair-judge.underpassai.com/v1/chat/completions
  LLM_JUDGE_ENDPOINT: http://vllm-judge:8000/v1/chat/completions
  LLM_JUDGE_MODEL: Qwen/Qwen3.5-9B
  LLM_JUDGE_PROVIDER: openai
  # The semantic classifier can stay on chat/completions, or point to a
  # dedicated vLLM reranker /score endpoint.
  LLM_SEMANTIC_CLASSIFIER_ENDPOINT: http://vllm-semantic-reranker:8000/score
  LLM_SEMANTIC_CLASSIFIER_MODEL: Qwen/Qwen3-Reranker-0.6B
  LLM_SEMANTIC_CLASSIFIER_PROVIDER: openai
  LLM_SEMANTIC_CLASSIFIER_MODE: score
---
apiVersion: v1
kind: Secret
metadata:
  name: rehydration-kernel-llm-client-secrets
  namespace: underpass-runtime
type: Opaque
stringData:
  LLM_API_KEY: ""
  LLM_JUDGE_API_KEY: ""
  LLM_SEMANTIC_CLASSIFIER_API_KEY: ""
