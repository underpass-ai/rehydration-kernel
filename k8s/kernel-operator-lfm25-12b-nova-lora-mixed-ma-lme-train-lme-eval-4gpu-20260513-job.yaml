apiVersion: batch/v1
kind: Job
metadata:
  name: kop-lfm25-12b-nova-lora-mixed-lme-eval-4gpu-20260513
  annotations:
    underpass.ai/quarantine-reason: "Historical Operator experiment; superseded by strict KMP-cursor/source-kind-agent datasets and kept for traceability only."
  labels:
    app.kubernetes.io/name: kop-lfm25-12b-nova-lora-mixed-lme-eval-4gpu-20260513
    app.kubernetes.io/part-of: underpass-kmp
spec:
  suspend: true
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kop-lfm25-12b-nova-lora-mixed-lme-eval-4gpu-20260513
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: docker.io/pytorch/pytorch:2.7.1-cuda12.8-cudnn9-runtime
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/repo
          env:
            - name: HF_HOME
              value: /host-tmp/huggingface
            - name: TRANSFORMERS_CACHE
              value: /host-tmp/huggingface/transformers
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: expandable_segments:True
            - name: NCCL_P2P_DISABLE
              value: "1"
            - name: NCCL_IB_DISABLE
              value: "1"
          command:
            - bash
            - -lc
          args:
            - |
              set -euo pipefail
              python -m pip install --upgrade pip
              python -m pip install \
                "transformers>=4.51.0" \
                "datasets>=3.6.0" \
                "peft>=0.15.0" \
                "accelerate>=1.7.0" \
                "trl>=0.18.0" \
                sentencepiece
              rm -rf /host-tmp/kernel-operator-lfm25-12b-nova-lora-mixed-ma-lme-train-lme-eval-4gpu-20260513
              torchrun --standalone --nproc_per_node=4 scripts/operator/train_operator_sft_lora.py \
                --train-jsonl /host-tmp/kernel-operator-sft-mixed-memoryarena-longmemeval-train-lme-eval-20260513/openai_train.jsonl \
                --eval-jsonl /host-tmp/kernel-operator-sft-mixed-memoryarena-longmemeval-train-lme-eval-20260513/openai_eval.jsonl \
                --model-id NovachronoAI/LFM2.5-1.2B-Nova-Function-Calling \
                --output-dir /host-tmp/kernel-operator-lfm25-12b-nova-lora-mixed-ma-lme-train-lme-eval-4gpu-20260513 \
                --epochs 1 \
                --batch-size 4 \
                --grad-accum 1 \
                --max-length 2048 \
                --lora-target-modules all-linear \
                --device-map none \
                --fp16
          resources:
            limits:
              nvidia.com/gpu: "4"
              memory: 96Gi
            requests:
              nvidia.com/gpu: "4"
              cpu: "12"
              memory: 64Gi
          volumeMounts:
            - name: repo
              mountPath: /workspace/repo
            - name: host-tmp
              mountPath: /host-tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/tirso/ai/developents/rehydration-kernel
            type: Directory
        - name: host-tmp
          hostPath:
            path: /tmp
            type: Directory
