apiVersion: batch/v1
kind: Job
metadata:
  name: kop-qwen05-lora-wexec-prep-sk-agent-4gpu-20260517
  namespace: underpass-runtime
  labels:
    app.kubernetes.io/name: kop-qwen05-lora-wexec-prep-sk-agent-4gpu-20260517
    app.kubernetes.io/part-of: underpass-kmp
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kop-qwen05-lora-wexec-prep-sk-agent-4gpu-20260517
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: docker.io/pytorch/pytorch:2.7.1-cuda12.8-cudnn9-runtime
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/repo
          env:
            - name: HF_HOME
              value: /host-tmp/huggingface
            - name: TRANSFORMERS_CACHE
              value: /host-tmp/huggingface/transformers
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: expandable_segments:True
            - name: NCCL_P2P_DISABLE
              value: "1"
            - name: NCCL_IB_DISABLE
              value: "1"
          command:
            - bash
            - -lc
          args:
            - |
              set -euo pipefail
              python scripts/operator/train_operator_sft_lora.py \
                --train-jsonl /operator-artifacts/kernel-operator-sft-writer-exec-v1-prepared-exec-source-kind-agent-20260517/openai_train.jsonl \
                --eval-jsonl /operator-artifacts/kernel-operator-sft-writer-exec-v1-prepared-exec-source-kind-agent-20260517/openai_eval.jsonl \
                --output-dir /operator-runs/kernel-operator-qwen05-lora-writer-exec-prepared-source-kind-agent-validate-only \
                --validate-only
              python -m pip install --upgrade pip
              python -m pip install \
                "transformers>=4.51.0" \
                "datasets>=3.6.0" \
                "peft>=0.15.0" \
                "accelerate>=1.7.0" \
                "trl>=0.18.0" \
                sentencepiece
              rm -rf /operator-runs/kernel-operator-qwen05-lora-writer-exec-prepared-source-kind-agent-4gpu-20260517
              torchrun --standalone --nproc_per_node=4 scripts/operator/train_operator_sft_lora.py \
                --train-jsonl /operator-artifacts/kernel-operator-sft-writer-exec-v1-prepared-exec-source-kind-agent-20260517/openai_train.jsonl \
                --eval-jsonl /operator-artifacts/kernel-operator-sft-writer-exec-v1-prepared-exec-source-kind-agent-20260517/openai_eval.jsonl \
                --model-id Qwen/Qwen2.5-0.5B-Instruct \
                --output-dir /operator-runs/kernel-operator-qwen05-lora-writer-exec-prepared-source-kind-agent-4gpu-20260517 \
                --epochs 5 \
                --batch-size 4 \
                --grad-accum 1 \
                --max-length 3072 \
                --device-map none \
                --fp16
          resources:
            limits:
              nvidia.com/gpu: "4"
              memory: 96Gi
            requests:
              nvidia.com/gpu: "4"
              cpu: "12"
              memory: 64Gi
          volumeMounts:
            - name: repo
              mountPath: /workspace/repo
            - name: host-tmp
              mountPath: /host-tmp
            - name: operator-artifacts
              mountPath: /operator-artifacts
              readOnly: true
            - name: operator-runs
              mountPath: /operator-runs
      volumes:
        - name: repo
          hostPath:
            path: /home/tirso/ai/developents/rehydration-kernel
            type: Directory
        - name: operator-artifacts
          hostPath:
            path: /home/tirso/ai/developents/rehydration-kernel-artifacts/operator/2026-05-17-kmp-cursor-contract-refresh
            type: Directory
        - name: operator-runs
          hostPath:
            path: /home/tirso/ai/developents/rehydration-kernel-artifacts/operator/runs
            type: DirectoryOrCreate
        - name: host-tmp
          hostPath:
            path: /tmp
            type: Directory
