# vLLM repair judge — Qwen3.5-9B (1 GPU)
#
# Purpose:
# - dedicated OpenAI-compatible endpoint for repair-judge passes
# - same model/runtime as the main vllm-qwen35-9b service
# - separate Deployment/Service/Ingress so it can scale or fail independently
#
# Apply:
#   kubectl apply -f k8s/vllm-qwen35-9b-repair-judge.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-repair-judge
  namespace: underpass-runtime
  labels:
    app: vllm-judge
    app.kubernetes.io/component: vllm-repair-judge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-judge
  template:
    metadata:
      labels:
        app: vllm-judge
        app.kubernetes.io/component: vllm-repair-judge
    spec:
      enableServiceLinks: false
      containers:
        - name: vllm
          image: docker.io/vllm/vllm-openai:v0.18.0-cu130
          imagePullPolicy: IfNotPresent
          args:
            - "--model=Qwen/Qwen3.5-9B"
            - "--tensor-parallel-size=1"
            - "--max-model-len=16384"
            - "--gpu-memory-utilization=0.95"
            - "--enforce-eager"
            - "--trust-remote-code"
            - "--host=0.0.0.0"
            - "--reasoning-parser=qwen3"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser=qwen3_coder"
            - "--language-model-only"
          env:
            - name: HF_HOME
              value: /tmp/hf-cache
            - name: LD_LIBRARY_PATH
              value: /usr/lib
            - name: VLLM_ATTENTION_BACKEND
              value: FLASHINFER
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: HF_TOKEN
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: 16Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 24Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: hf-cache
              mountPath: /tmp/hf-cache
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: vllm-hf-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-judge
  namespace: underpass-runtime
  labels:
    app: vllm-judge
    app.kubernetes.io/component: vllm-repair-judge
spec:
  type: ClusterIP
  selector:
    app: vllm-judge
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm-repair-judge
  namespace: underpass-runtime
  labels:
    app.kubernetes.io/component: vllm-repair-judge
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-r53
    nginx.ingress.kubernetes.io/auth-tls-secret: underpass-runtime/underpass-demo-client-tls
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "1"
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: vllm-repair-judge.underpassai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vllm-judge
                port:
                  number: 8000
  tls:
    - hosts:
        - vllm-repair-judge.underpassai.com
      secretName: vllm-repair-judge-tls
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm-repair-judge
  namespace: underpass-runtime
  labels:
    app: vllm-judge
    app.kubernetes.io/component: vllm-repair-judge
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: vllm-judge
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
