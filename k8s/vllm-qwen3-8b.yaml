# vLLM — Qwen3-8B (1 GPU)
#
# Qwen3 thinks by default. --reasoning-parser + --reasoning-config separate
# <think> tags into the `reasoning_content` response field.
# --reasoning-config enables thinking_token_budget enforcement per request.
#
# Client-side control:
#   Thinking ON:  omit chat_template_kwargs (default)
#   Thinking OFF: chat_template_kwargs: {"enable_thinking": false}
#   Budget:       thinking_token_budget: N in request body
#
# Qwen3 model card sampling:
#   Thinking:    temp=0.6, top_p=0.95 (DO NOT use greedy)
#   No-thinking: temp=0.7, top_p=0.8
#
# Apply: kubectl apply -f k8s/vllm-qwen3-8b.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: underpass-runtime
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm
          image: docker.io/vllm/vllm-openai:v0.18.0-cu130
          args:
            - "--model=Qwen/Qwen3-8B"
            - "--tensor-parallel-size=1"
            - "--max-model-len=8192"
            - "--gpu-memory-utilization=0.85"
            - "--trust-remote-code"
            - "--host=0.0.0.0"
            - "--reasoning-parser=qwen3"
          env:
            - name: HF_HOME
              value: /tmp/hf-cache
            - name: LD_LIBRARY_PATH
              value: /usr/lib
            - name: VLLM_ATTENTION_BACKEND
              value: FLASHINFER
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: "16Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "24Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - mountPath: /tmp/hf-cache
              name: hf-cache
            - mountPath: /dev/shm
              name: shm
      volumes:
        - name: hf-cache
          emptyDir:
            sizeLimit: 20Gi
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
