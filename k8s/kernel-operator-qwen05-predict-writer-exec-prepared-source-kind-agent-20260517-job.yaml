apiVersion: batch/v1
kind: Job
metadata:
  name: kop-qwen05-predict-wexec-prep-sk-agent-20260517
  namespace: underpass-runtime
  labels:
    app.kubernetes.io/name: kop-qwen05-predict-wexec-prep-sk-agent-20260517
    app.kubernetes.io/part-of: underpass-kmp
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kop-qwen05-predict-wexec-prep-sk-agent-20260517
    spec:
      restartPolicy: Never
      containers:
        - name: predictor
          image: docker.io/pytorch/pytorch:2.7.1-cuda12.8-cudnn9-runtime
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/repo
          env:
            - name: HF_HOME
              value: /host-tmp/huggingface
            - name: TRANSFORMERS_CACHE
              value: /host-tmp/huggingface/transformers
          command:
            - bash
            - -lc
          args:
            - |
              set -euo pipefail
              python scripts/operator/predict_operator_sft.py \
                --dataset-jsonl /operator-artifacts/kernel-operator-sft-writer-exec-v1-prepared-exec-source-kind-agent-20260517/eval.jsonl \
                --model-id Qwen/Qwen2.5-0.5B-Instruct \
                --output /operator-runs/kernel-operator-qwen05-predictions-writer-exec-prepared-source-kind-agent-validate-only \
                --resolve-prepared-payloads \
                --validate-only
              python -m pip install --upgrade pip
              python -m pip install \
                "transformers>=4.51.0" \
                "datasets>=3.6.0" \
                "peft>=0.15.0" \
                "accelerate>=1.7.0" \
                sentencepiece
              rm -rf /operator-runs/kernel-operator-qwen05-predictions-writer-exec-prepared-source-kind-agent-20260517
              python scripts/operator/predict_operator_sft.py \
                --dataset-jsonl /operator-artifacts/kernel-operator-sft-writer-exec-v1-prepared-exec-source-kind-agent-20260517/eval.jsonl \
                --model-id Qwen/Qwen2.5-0.5B-Instruct \
                --adapter /operator-runs/kernel-operator-qwen05-lora-writer-exec-prepared-source-kind-agent-4gpu-20260517 \
                --output /operator-runs/kernel-operator-qwen05-predictions-writer-exec-prepared-source-kind-agent-20260517 \
                --batch-size 4 \
                --max-new-tokens 256 \
                --stop-after-json \
                --resolve-prepared-payloads \
                --force
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: 24Gi
            requests:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: 16Gi
          volumeMounts:
            - name: repo
              mountPath: /workspace/repo
            - name: host-tmp
              mountPath: /host-tmp
            - name: operator-artifacts
              mountPath: /operator-artifacts
              readOnly: true
            - name: operator-runs
              mountPath: /operator-runs
      volumes:
        - name: repo
          hostPath:
            path: /home/tirso/ai/developents/rehydration-kernel
            type: Directory
        - name: operator-artifacts
          hostPath:
            path: /home/tirso/ai/developents/rehydration-kernel-artifacts/operator/2026-05-17-kmp-cursor-contract-refresh
            type: Directory
        - name: operator-runs
          hostPath:
            path: /home/tirso/ai/developents/rehydration-kernel-artifacts/operator/runs
            type: DirectoryOrCreate
        - name: host-tmp
          hostPath:
            path: /tmp
            type: Directory
