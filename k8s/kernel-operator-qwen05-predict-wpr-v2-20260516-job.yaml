apiVersion: batch/v1
kind: Job
metadata:
  name: kop-qwen05-predict-wpr-v2-20260516
  namespace: underpass-runtime
  labels:
    app.kubernetes.io/name: kop-qwen05-predict-wpr-v2-20260516
    app.kubernetes.io/part-of: underpass-kmp
  annotations:
    underpass.ai/quarantine-reason: "Superseded writer-pre-read-v2 diagnostic run; use writer-pre-read-v4-kmp-cursor-v2 or writer-orchestration-v2."
spec:
  suspend: true
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kop-qwen05-predict-wpr-v2-20260516
    spec:
      restartPolicy: Never
      containers:
        - name: predictor
          image: docker.io/pytorch/pytorch:2.7.1-cuda12.8-cudnn9-runtime
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/repo
          env:
            - name: HF_HOME
              value: /host-tmp/huggingface
            - name: TRANSFORMERS_CACHE
              value: /host-tmp/huggingface/transformers
          command:
            - bash
            - -lc
          args:
            - |
              set -euo pipefail
              python -m pip install --upgrade pip
              python -m pip install \
                "transformers>=4.51.0" \
                "datasets>=3.6.0" \
                "peft>=0.15.0" \
                "accelerate>=1.7.0" \
                sentencepiece
              rm -rf /host-tmp/kernel-operator-qwen05-predictions-wpr-v2-20260516
              python scripts/operator/predict_operator_sft.py \
                --dataset-jsonl /host-tmp/kernel-operator-sft-p111-smart-writer-pre-read-mixed-v2-no-overlap-r05-20260516/eval.jsonl \
                --model-id Qwen/Qwen2.5-0.5B-Instruct \
                --adapter /host-tmp/kernel-operator-qwen05-lora-wpr-v2-4gpu-20260516 \
                --output /host-tmp/kernel-operator-qwen05-predictions-wpr-v2-20260516 \
                --batch-size 4 \
                --max-new-tokens 350 \
                --stop-after-json \
                --force
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: 24Gi
            requests:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: 16Gi
          volumeMounts:
            - name: repo
              mountPath: /workspace/repo
            - name: host-tmp
              mountPath: /host-tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/tirso/ai/developents/rehydration-kernel
            type: Directory
        - name: host-tmp
          hostPath:
            path: /tmp
            type: Directory
