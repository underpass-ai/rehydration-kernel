apiVersion: batch/v1
kind: Job
metadata:
  name: kop-qwen05-lora-opread-v5-20260515
  namespace: underpass-runtime
  labels:
    app.kubernetes.io/name: kop-qwen05-lora-opread-v5-20260515
    app.kubernetes.io/part-of: underpass-kmp
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kop-qwen05-lora-opread-v5-20260515
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: docker.io/pytorch/pytorch:2.7.1-cuda12.8-cudnn9-runtime
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/repo
          env:
            - name: HF_HOME
              value: /host-tmp/huggingface
            - name: TRANSFORMERS_CACHE
              value: /host-tmp/huggingface/transformers
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: expandable_segments:True
          command:
            - bash
            - -lc
          args:
            - |
              set -euo pipefail
              python -m pip install --upgrade pip
              python -m pip install \
                "transformers>=4.51.0" \
                "datasets>=3.6.0" \
                "peft>=0.15.0" \
                "accelerate>=1.7.0" \
                "trl>=0.18.0" \
                sentencepiece
              rm -rf /host-tmp/kernel-operator-qwen05-lora-opread-goldenv4-p111req200-v5-20260515
              python scripts/operator/train_operator_sft_lora.py \
                --train-jsonl /host-tmp/kernel-operator-mixed-goldenv4-p111req200-read-sft/openai_train.jsonl \
                --eval-jsonl /host-tmp/kernel-operator-mixed-goldenv4-p111req200-read-sft/openai_eval.jsonl \
                --model-id Qwen/Qwen2.5-0.5B-Instruct \
                --output-dir /host-tmp/kernel-operator-qwen05-lora-opread-goldenv4-p111req200-v5-20260515 \
                --epochs 4 \
                --batch-size 2 \
                --grad-accum 1 \
                --max-length 2048 \
                --fp16
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: 24Gi
            requests:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: 16Gi
          volumeMounts:
            - name: repo
              mountPath: /workspace/repo
            - name: host-tmp
              mountPath: /host-tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/tirso/ai/developents/rehydration-kernel
            type: Directory
        - name: host-tmp
          hostPath:
            path: /tmp
            type: Directory
