apiVersion: batch/v1
kind: Job
metadata:
  name: kernel-operator-qwen05-predict-v6-holdout20
  labels:
    app.kubernetes.io/name: kernel-operator-qwen05-predict-v6-holdout20
    app.kubernetes.io/part-of: underpass-kmp
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kernel-operator-qwen05-predict-v6-holdout20
    spec:
      restartPolicy: Never
      containers:
        - name: predictor
          image: docker.io/pytorch/pytorch:2.7.1-cuda12.8-cudnn9-runtime
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/repo
          env:
            - name: HF_HOME
              value: /host-tmp/huggingface
            - name: TRANSFORMERS_CACHE
              value: /host-tmp/huggingface/transformers
          command:
            - bash
            - -lc
          args:
            - |
              set -euo pipefail
              python -m pip install --upgrade pip
              python -m pip install \
                "transformers>=4.51.0" \
                "datasets>=3.6.0" \
                "peft>=0.15.0" \
                "accelerate>=1.7.0" \
                sentencepiece
              rm -rf /host-tmp/kernel-operator-qwen05-predictions-v6-holdout20
              python scripts/operator/predict_operator_sft.py \
                --dataset-jsonl /host-tmp/kernel-operator-sft-100-with-writer-by-task-anon-visible-candidate-details-holdout20/eval.jsonl \
                --model-id Qwen/Qwen2.5-0.5B-Instruct \
                --adapter /host-tmp/kernel-operator-qwen05-lora-v6-holdout20 \
                --output /host-tmp/kernel-operator-qwen05-predictions-v6-holdout20 \
                --batch-size 8 \
                --force
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: 24Gi
            requests:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: 16Gi
          volumeMounts:
            - name: repo
              mountPath: /workspace/repo
            - name: host-tmp
              mountPath: /host-tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/tirso/ai/developents/rehydration-kernel
            type: Directory
        - name: host-tmp
          hostPath:
            path: /tmp
            type: Directory
