# vLLM — Qwen3-14B (2 GPU, tensor parallel)
#
# Qwen3 thinks by default. --reasoning-parser=qwen3 separates <think> tags
# into the `reasoning_content` response field.
#
# Client-side control (chat_template_kwargs):
#   Thinking ON:  omit chat_template_kwargs (default)
#   Thinking OFF: {"enable_thinking": false}
#
# Apply: kubectl apply -f k8s/vllm-qwen3-14b.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: underpass-runtime
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm
          image: docker.io/vllm/vllm-openai:v0.15.0-cu130
          args:
            - "--model=Qwen/Qwen3-14B"
            - "--tensor-parallel-size=2"
            - "--max-model-len=8192"
            - "--gpu-memory-utilization=0.90"
            - "--trust-remote-code"
            - "--host=0.0.0.0"
            - "--reasoning-parser=qwen3"
          env:
            - name: HF_HOME
              value: /tmp/hf-cache
            - name: LD_LIBRARY_PATH
              value: /usr/lib
            - name: VLLM_ATTENTION_BACKEND
              value: FLASHINFER
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: "32Gi"
              nvidia.com/gpu: "2"
            limits:
              cpu: "4"
              memory: "48Gi"
              nvidia.com/gpu: "2"
          volumeMounts:
            - mountPath: /tmp/hf-cache
              name: hf-cache
            - mountPath: /dev/shm
              name: shm
      volumes:
        - name: hf-cache
          emptyDir:
            sizeLimit: 30Gi
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 4Gi
