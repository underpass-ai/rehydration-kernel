# vLLM — Qwen3-4B (1 GPU)
#
# Smaller reasoning model — same thinking architecture as 8B, ~2x faster.
# --reasoning-parser=qwen3 separates <think> into `reasoning` field.
#
# Client-side control:
#   Thinking ON:  omit chat_template_kwargs (default)
#   Thinking OFF: chat_template_kwargs: {"enable_thinking": false}
#
# Qwen3 model card: temp=0.6, top_p=0.95 for thinking (NO greedy).
#
# Apply: kubectl apply -f k8s/vllm-qwen3-4b.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-server
  namespace: underpass-runtime
  labels:
    app: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm
          image: docker.io/vllm/vllm-openai:v0.18.0-cu130
          args:
            - "--model=Qwen/Qwen3-4B"
            - "--tensor-parallel-size=1"
            - "--max-model-len=8192"
            - "--gpu-memory-utilization=0.85"
            - "--trust-remote-code"
            - "--host=0.0.0.0"
            - "--reasoning-parser=qwen3"
          env:
            - name: HF_HOME
              value: /tmp/hf-cache
            - name: LD_LIBRARY_PATH
              value: /usr/lib
            - name: VLLM_ATTENTION_BACKEND
              value: FLASHINFER
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "2"
              memory: "10Gi"
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: "1"
          volumeMounts:
            - mountPath: /tmp/hf-cache
              name: hf-cache
            - mountPath: /dev/shm
              name: shm
      volumes:
        - name: hf-cache
          emptyDir:
            sizeLimit: 15Gi
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
