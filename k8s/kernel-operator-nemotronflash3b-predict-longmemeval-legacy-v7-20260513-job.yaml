apiVersion: batch/v1
kind: Job
metadata:
  name: kop-nemotronflash3b-predict-lme-v7-20260513
  annotations:
    underpass.ai/quarantine-reason: "Historical Operator experiment; superseded by strict KMP-cursor/source-kind-agent datasets and kept for traceability only."
  labels:
    app.kubernetes.io/name: kop-nemotronflash3b-predict-lme-v7-20260513
    app.kubernetes.io/part-of: underpass-kmp
spec:
  suspend: true
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kop-nemotronflash3b-predict-lme-v7-20260513
    spec:
      restartPolicy: Never
      containers:
        - name: predictor
          image: ghcr.io/underpass-ai/operator-nemotron:torch2.9.1-cuda13.0-sm80-20260513
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/repo
          env:
            - name: HF_HOME
              value: /host-tmp/huggingface
            - name: TRANSFORMERS_CACHE
              value: /host-tmp/huggingface/transformers
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: expandable_segments:True
            - name: MAX_JOBS
              value: "4"
            - name: TORCH_CUDA_ARCH_LIST
              value: "8.0"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: HF_TOKEN
          command:
            - bash
            - -lc
          args:
            - |
              set -euo pipefail
              rm -rf /host-tmp/kernel-operator-nemotronflash3b-predictions-longmemeval-legacy-v7-20260513
              python scripts/operator/predict_operator_sft.py \
                --dataset-jsonl /host-tmp/kernel-operator-sft-longmemeval-legacy-v7-20260513/eval.jsonl \
                --model-id nvidia/Nemotron-Flash-3B-Instruct \
                --adapter /host-tmp/kernel-operator-nemotronflash3b-lora-longmemeval-legacy-v7-20260513 \
                --output /host-tmp/kernel-operator-nemotronflash3b-predictions-longmemeval-legacy-v7-20260513 \
                --trust-remote-code \
                --torch-dtype float16 \
                --config-override attn_implementation_new=flash_attention_2 \
                --config-override use_mamba_kernels=true \
                --batch-size 2 \
                --stop-after-json \
                --force
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: 64Gi
            requests:
              nvidia.com/gpu: "1"
              cpu: "6"
              memory: 40Gi
          volumeMounts:
            - name: repo
              mountPath: /workspace/repo
            - name: host-tmp
              mountPath: /host-tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/tirso/ai/developents/rehydration-kernel
            type: Directory
        - name: host-tmp
          hostPath:
            path: /tmp
            type: Directory
