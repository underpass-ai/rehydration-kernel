# vLLM semantic reranker — Qwen3-Reranker-0.6B (1 GPU)
#
# Purpose:
# - dedicated vLLM pooling endpoint for semantic_class scoring
# - uses the official Qwen reranker weights with the vLLM overrides documented
#   for `/score`
# - internal-only first; validate the scoring path before adding ingress
#
# Apply:
#   kubectl apply -f k8s/vllm-qwen3-reranker-0.6b.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-semantic-reranker
  namespace: underpass-runtime
  labels:
    app: vllm-semantic-reranker
    app.kubernetes.io/component: vllm-semantic-reranker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-semantic-reranker
  template:
    metadata:
      labels:
        app: vllm-semantic-reranker
        app.kubernetes.io/component: vllm-semantic-reranker
    spec:
      enableServiceLinks: false
      containers:
        - name: vllm
          image: docker.io/vllm/vllm-openai:v0.18.0-cu130
          imagePullPolicy: IfNotPresent
          args:
            - "--model=Qwen/Qwen3-Reranker-0.6B"
            - "--served-model-name=Qwen/Qwen3-Reranker-0.6B"
            - "--runner=pooling"
            - "--convert=classify"
            - "--max-model-len=4096"
            - "--gpu-memory-utilization=0.40"
            - "--trust-remote-code"
            - "--host=0.0.0.0"
            - '--hf_overrides={"architectures":["Qwen3ForSequenceClassification"],"classifier_from_token":["no","yes"],"is_original_qwen3_reranker":true}'
            - "--chat-template=examples/pooling/score/template/qwen3_reranker.jinja"
          env:
            - name: HF_HOME
              value: /tmp/hf-cache
            - name: LD_LIBRARY_PATH
              value: /usr/lib
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: HF_TOKEN
          ports:
            - containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "1"
              memory: 8Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "2"
              memory: 12Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: hf-cache
              mountPath: /tmp/hf-cache
            - name: shm
              mountPath: /dev/shm
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: vllm-hf-cache
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-semantic-reranker
  namespace: underpass-runtime
  labels:
    app: vllm-semantic-reranker
    app.kubernetes.io/component: vllm-semantic-reranker
spec:
  type: ClusterIP
  selector:
    app: vllm-semantic-reranker
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vllm-semantic-reranker
  namespace: underpass-runtime
  labels:
    app.kubernetes.io/component: vllm-semantic-reranker
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod-r53
    nginx.ingress.kubernetes.io/auth-tls-secret: underpass-runtime/underpass-demo-client-tls
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "1"
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: vllm-semantic-reranker.underpassai.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vllm-semantic-reranker
                port:
                  number: 8000
  tls:
    - hosts:
        - vllm-semantic-reranker.underpassai.com
      secretName: vllm-semantic-reranker-tls
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm-semantic-reranker
  namespace: underpass-runtime
  labels:
    app: vllm-semantic-reranker
    app.kubernetes.io/component: vllm-semantic-reranker
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: vllm-semantic-reranker
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
