apiVersion: batch/v1
kind: Job
metadata:
  name: kop-functiongemma270m-lora-lme-v7-20260513
  labels:
    app.kubernetes.io/name: kop-functiongemma270m-lora-lme-v7-20260513
    app.kubernetes.io/part-of: underpass-kmp
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kop-functiongemma270m-lora-lme-v7-20260513
    spec:
      restartPolicy: Never
      containers:
        - name: trainer
          image: docker.io/pytorch/pytorch:2.7.1-cuda12.8-cudnn9-runtime
          imagePullPolicy: IfNotPresent
          workingDir: /workspace/repo
          env:
            - name: HF_HOME
              value: /host-tmp/huggingface
            - name: TRANSFORMERS_CACHE
              value: /host-tmp/huggingface/transformers
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: expandable_segments:True
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-token
                  key: HF_TOKEN
          command:
            - bash
            - -lc
          args:
            - |
              set -euo pipefail
              : "${HF_TOKEN:?missing HF_TOKEN from underpass-runtime/huggingface-token}"
              python -m pip install --upgrade pip
              python -m pip install \
                "transformers>=4.51.0" \
                "datasets>=3.6.0" \
                "peft>=0.15.0" \
                "accelerate>=1.7.0" \
                "trl>=0.18.0" \
                sentencepiece
              rm -rf /host-tmp/kernel-operator-functiongemma270m-lora-longmemeval-legacy-v7-20260513
              python scripts/operator/train_operator_sft_lora.py \
                --train-jsonl /host-tmp/kernel-operator-sft-longmemeval-legacy-v7-20260513/openai_train.jsonl \
                --eval-jsonl /host-tmp/kernel-operator-sft-longmemeval-legacy-v7-20260513/openai_eval.jsonl \
                --model-id google/functiongemma-270m-it \
                --output-dir /host-tmp/kernel-operator-functiongemma270m-lora-longmemeval-legacy-v7-20260513 \
                --epochs 3 \
                --batch-size 2 \
                --grad-accum 8 \
                --max-length 2048 \
                --fp16
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: 32Gi
            requests:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: 20Gi
          volumeMounts:
            - name: repo
              mountPath: /workspace/repo
            - name: host-tmp
              mountPath: /host-tmp
      volumes:
        - name: repo
          hostPath:
            path: /home/tirso/ai/developents/rehydration-kernel
            type: Directory
        - name: host-tmp
          hostPath:
            path: /tmp
            type: Directory
