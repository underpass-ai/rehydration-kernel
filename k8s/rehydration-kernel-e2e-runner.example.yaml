apiVersion: batch/v1
kind: Job
metadata:
  name: rehydration-kernel-e2e-runner
  namespace: underpass-runtime
spec:
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: rehydration-kernel
      imagePullSecrets:
        - name: ghcr-pull
      restartPolicy: Never
      containers:
        - name: runner
          image: ghcr.io/underpass-ai/rehydration-kernel-e2e-runner:dev
          imagePullPolicy: Always
          env:
            # Select one of:
            #   sync-grpc-handshake
            #   sync-mtls-enforcement
            #   async-graph-batch-roundtrip
            #   async-vllm-graph-batch-roundtrip
            #   async-vllm-blind-context-consumption
            - name: TEST_ID
              value: async-graph-batch-roundtrip

            # Sync gRPC probe path.
            - name: KERNEL_GRPC_HOST
              value: rehydration-kernel
            - name: KERNEL_GRPC_PORT
              value: "50054"
            - name: TLS_CA
              value: /var/run/rehydration-kernel/tls/ca.crt
            - name: TLS_CERT
              value: /var/run/rehydration-kernel/tls/tls.crt
            - name: TLS_KEY
              value: /var/run/rehydration-kernel/tls/tls.key

            # Async kernel contract path.
            - name: PIR_GRAPH_BATCH_NATS_URL
              value: nats://rehydration-kernel-nats:4222
            - name: PIR_GRAPH_BATCH_GRPC_ENDPOINT
              value: https://rehydration-kernel:50054
            - name: PIR_GRAPH_BATCH_GRPC_TLS_CA_PATH
              value: /var/run/rehydration-kernel/tls/ca.crt
            - name: PIR_GRAPH_BATCH_GRPC_TLS_CERT_PATH
              value: /var/run/rehydration-kernel/tls/tls.crt
            - name: PIR_GRAPH_BATCH_GRPC_TLS_KEY_PATH
              value: /var/run/rehydration-kernel/tls/tls.key
            - name: PIR_GRAPH_BATCH_GRPC_TLS_DOMAIN_NAME
              value: rehydration-kernel
            - name: PIR_GRAPH_BATCH_NATS_TLS_CA_PATH
              value: /var/run/rehydration-kernel/nats-tls/ca.crt
            - name: PIR_GRAPH_BATCH_NATS_TLS_CERT_PATH
              value: /var/run/rehydration-kernel/nats-tls/tls.crt
            - name: PIR_GRAPH_BATCH_NATS_TLS_KEY_PATH
              value: /var/run/rehydration-kernel/nats-tls/tls.key

            # Uncomment for model-driven async runs.
            # - name: TEST_ID
            #   value: async-vllm-graph-batch-roundtrip
            # - name: VLLM_REQUEST_KIND
            #   value: blind
            # - name: VLLM_REQUEST_USE_SEMANTIC_CLASSIFIER
            #   value: "true"
            # - name: VLLM_REQUEST_NAMESPACE_NODE_IDS
            #   value: "true"
            # - name: LLM_ENDPOINT
            #   value: http://vllm-qwen35-9b:8000/v1/chat/completions
            # - name: LLM_MODEL
            #   value: Qwen/Qwen3.5-9B
            # - name: LLM_PROVIDER
            #   value: openai
            # - name: LLM_ENABLE_THINKING
            #   value: "false"
            # - name: LLM_SEMANTIC_CLASSIFIER_ENDPOINT
            #   value: http://vllm-semantic-reranker:8000/score
            # - name: LLM_SEMANTIC_CLASSIFIER_MODEL
            #   value: Qwen/Qwen3-Reranker-0.6B
            # - name: LLM_SEMANTIC_CLASSIFIER_PROVIDER
            #   value: openai
            # - name: LLM_SEMANTIC_CLASSIFIER_MODE
            #   value: score
            #
            # Uncomment for model-driven async context-consumption runs.
            # - name: TEST_ID
            #   value: async-vllm-blind-context-consumption
            # - name: VLLM_REQUEST_KIND
            #   value: blind
            # - name: VLLM_REQUEST_USE_SEMANTIC_CLASSIFIER
            #   value: "true"
            # - name: VLLM_REQUEST_NAMESPACE_NODE_IDS
            #   value: "true"
            # - name: PIR_GRAPH_BATCH_INCLUDE_RENDERED_CONTENT
            #   value: "true"
            # - name: PIR_GRAPH_BATCH_REHYDRATION_MODE
            #   value: reason_preserving
            # - name: LLM_ENDPOINT
            #   value: http://vllm-qwen35-9b:8000/v1/chat/completions
            # - name: LLM_MODEL
            #   value: Qwen/Qwen3.5-9B
            # - name: LLM_PROVIDER
            #   value: openai
            # - name: LLM_ENABLE_THINKING
            #   value: "false"
            # - name: LLM_SEMANTIC_CLASSIFIER_ENDPOINT
            #   value: http://vllm-semantic-reranker:8000/score
            # - name: LLM_SEMANTIC_CLASSIFIER_MODEL
            #   value: Qwen/Qwen3-Reranker-0.6B
            # - name: LLM_SEMANTIC_CLASSIFIER_PROVIDER
            #   value: openai
            # - name: LLM_SEMANTIC_CLASSIFIER_MODE
            #   value: score
          volumeMounts:
            - name: grpc-tls
              mountPath: /var/run/rehydration-kernel/tls
              readOnly: true
            - name: nats-tls
              mountPath: /var/run/rehydration-kernel/nats-tls
              readOnly: true
      volumes:
        - name: grpc-tls
          secret:
            secretName: pir-grpc-client-tls
        - name: nats-tls
          secret:
            secretName: pir-nats-client-tls
